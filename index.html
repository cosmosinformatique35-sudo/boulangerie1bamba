<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boulangerie Bamba – Gestion Pro v15</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:   #D97706;
    --brown:  #92400E;
    --amber:  #F59E0B;
    --green:  #059669;
    --red:    #DC2626;
    --yellow: #EAB308;
    --cream:  #FFFBEB;
    --white:  #FFFFFF;
    --dark:   #1F2937;
    --muted:  #6B7280;
    --border: #FDE68A;
    --bg:     #FFF7ED;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #FFF7ED 0%, #FFFBEB 100%);
    min-height: 100vh;
    color: var(--dark);
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── Layout ── */
  #root { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: linear-gradient(180deg, #78350F 0%, #451a03 100%);
    padding: 28px 20px; color: #fff;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo { text-align: center; margin-bottom: 36px; }
  .sidebar-logo span { 
    font-size: 44px; display: flex; justify-content: center; align-items: center; 
    width: 60px; height: 60px; margin: 0 auto;
  }
  .sidebar-logo span img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
  .sidebar-logo h2 { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; margin-top: 10px; }
  .sidebar-logo p { font-size: 11px; opacity: .7; margin-top: 3px; }
  .nav-btn {
    width: 100%; padding: 13px 14px; background: transparent;
    border: none; border-radius: 10px; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 11px;
    transition: background .18s; margin-bottom: 4px; text-align: start;
  }
  .nav-btn:hover { background: rgba(255,255,255,.1); }
  .nav-btn.active { background: rgba(255,255,255,.18); font-weight: 700; }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.15); }
  .user-badge {
    padding: 12px; background: rgba(255,255,255,.1);
    border-radius: 8px; margin-bottom: 10px;
    font-size: 13px;
  }
  .user-badge strong { display: block; font-size: 15px; }
  .btn-logout {
    width: 100%; padding: 11px; background: rgba(220,38,38,.2);
    border: 1px solid rgba(220,38,38,.3); border-radius: 8px;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .18s;
  }
  .btn-logout:hover { background: rgba(220,38,38,.35); }

  /* ── Main content ── */
  .main { flex: 1; padding: 36px 40px; overflow-y: auto; }
  .page-title {
    font-size: 30px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 28px;
  }
  .page-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 28px;
  }

  /* ── Cards ── */
  .card {
    background: var(--white); border-radius: 14px;
    border: 2px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,.05);
    padding: 24px;
  }
  .card-title {
    font-size: 16px; font-weight: 700; margin-bottom: 18px;
    color: var(--dark);
  }

  /* ── KPI grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 20px; margin-bottom: 28px; }
  .kpi {
    background: var(--white); border-radius: 14px;
    border: 2px solid var(--border);
    padding: 22px; box-shadow: 0 4px 16px rgba(0,0,0,.05);
  }
  .kpi-icon {
    width: 46px; height: 46px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 14px;
  }
  .kpi-label { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

  /* ── Chart grid ── */
  .chart-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(380px,1fr)); gap: 24px; margin-bottom: 28px; }

  /* ── Buttons ── */
  .btn-primary {
    padding: 11px 22px;
    background: linear-gradient(135deg, var(--gold), var(--amber));
    color: #fff; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
    box-shadow: 0 4px 14px rgba(217,119,6,.3);
    transition: transform .2s, box-shadow .2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217,119,6,.35); }
  .btn-secondary {
    padding: 11px 22px; background: #E5E7EB; color: var(--dark);
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .18s;
  }
  .btn-secondary:hover { background: #D1D5DB; }

  /* ── Table ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    padding: 13px 16px; background: var(--bg);
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--dark); text-align: start;
  }
  .data-table th.right, .data-table td.right { text-align: end; }
  .data-table td { padding: 15px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #FFFBF0; }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 20px;
  }
  .modal-box {
    background: var(--white); border-radius: 18px; padding: 32px;
    width: 100%; max-width: 480px; max-height: 90vh;
    overflow-y: auto; position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,.25);
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: #F3F4F6; border: none; width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: background .15s;
  }
  html[dir="rtl"] .modal-close { right: auto; left: 14px; }

  .modal-close:hover { background: #E5E7EB; }
  .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 22px; }

  /* ── Form ── */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 600; color: var(--dark); }
  .form-input, .form-select {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color .18s; background: var(--white);
  }
  .form-input:focus, .form-select:focus { border-color: var(--gold); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-actions { display: flex; gap: 12px; margin-top: 6px; }
  .form-actions .btn-secondary, .form-actions .btn-primary { flex: 1; justify-content: center; }

  /* ── Alert ── */
  .alert-error {
    background: #FEE2E2; border: 1px solid #FCA5A5; color: #991B1B;
    padding: 11px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .alert-success {
    background: #F0FDF4; border: 2px solid #86EFAC; color: var(--green);
    padding: 14px 16px; border-radius: 10px; font-size: 14px;
    margin-bottom: 18px;
  }
  .badge {
    padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 700;
    display: inline-block;
  }

  /* ── Login ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 20px;
    background: linear-gradient(135deg, #FFF7ED 0%, #FFFBEB 100%);
  }
  .login-card {
    background: var(--white); border-radius: 20px; padding: 44px 40px;
    width: 100%; max-width: 420px;
    border: 2px solid var(--border);
    box-shadow: 0 20px 50px rgba(217,119,6,.12);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-emoji {
    width: 80px; height: 80px; margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--gold), var(--amber));
    border-radius: 20px; display: flex; align-items: center;
    justify-content: center; font-size: 40px;
    transform: rotate(-5deg); box-shadow: 0 8px 20px rgba(217,119,6,.3);
    overflow: hidden; padding: 5px;
  }
  .login-emoji img { width: 100%; height: 100%; object-fit: contain; border-radius: 15px; transform: rotate(5deg); }
  .login-logo h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .login-logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .demo-hint {
    margin-top: 22px; padding: 14px 16px;
    background: #FEF3C7; border-radius: 10px;
    border: 1px dashed #FCD34D; font-size: 13px;
  }
  .demo-hint strong { color: var(--brown); display: block; margin-bottom: 5px; }

  /* ── Livreur header ── */
  .livreur-header {
    background: linear-gradient(135deg, var(--brown), var(--gold));
    padding: 28px 32px; border-radius: 16px; color: #fff;
    margin-bottom: 28px; display: flex; justify-content: space-between;
    align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,.15);
  }

  /* ── Client card ── */
  .client-card {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 14px; padding: 18px; font-size: 13px;
    box-shadow: 0 4px 14px rgba(0,0,0,.03); transition: transform 0.2s, box-shadow 0.2s;
  }
  .client-card:hover {
    transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.08);
  }
  .client-meta { color: var(--muted); margin-top: 5px; }

  /* ── Livreur card ── */
  .livreur-card {
    background: var(--white); border-radius: 14px; padding: 22px;
    border: 2px solid var(--border); box-shadow: 0 4px 14px rgba(0,0,0,.05);
  }
  .livreur-avatar {
    width: 52px; height: 52px; border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), var(--amber));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .livreur-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .mini-stat { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
  .mini-stat-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--muted); letter-spacing: .5px; }
  .mini-stat-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-top: 3px; }

  /* ── Bar chart shim (pure CSS) ── */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 180px; padding: 0 4px; }
  .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-fill {
    width: 100%; border-radius: 6px 6px 0 0;
    background: linear-gradient(180deg, var(--amber), var(--gold));
    min-height: 4px; transition: height .4s ease;
  }
  .bar-label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .line-chart { position: relative; height: 180px; }
  .line-svg { width: 100%; height: 100%; }

  /* ── Periode selector ── */
  .periode-select {
    padding: 10px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-family: 'DM Sans'; font-size: 14px;
    font-weight: 600; color: var(--dark); background: var(--white);
    cursor: pointer; outline: none;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 52px; margin-bottom: 14px; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { padding: 20px; }
    .chart-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── Chargeur ── */
  .chargeur-header {
    background: linear-gradient(135deg, #1E3A5F 0%, #1D4ED8 100%);
    padding: 28px 32px; border-radius: 16px; color: #fff;
    margin-bottom: 28px; display: flex; justify-content: space-between;
    align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .charge-card {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 14px; padding: 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,.05);
    transition: box-shadow .2s;
  }
  .charge-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.10); }
  .charge-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
    background: #DBEAFE; color: #1D4ED8;
  }
  .btn-charge {
    padding: 11px 22px;
    background: linear-gradient(135deg, #1D4ED8, #3B82F6);
    color: #fff; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
    box-shadow: 0 4px 14px rgba(29,78,216,.3);
    transition: transform .2s, box-shadow .2s;
  }
  .btn-charge:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(29,78,216,.35); }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:none;} }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes slideIn { from { opacity:0; transform:scale(.95);} to { opacity:1; transform:scale(1);} }
  .modal-box { animation: slideIn .2s ease; }

  /* ── Vendeur / Boutique ── */
  .vendeur-header {
    background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
    padding: 28px 32px; border-radius: 16px; color: #fff;
    margin-bottom: 28px; display: flex; justify-content: space-between;
    align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }

  /* ── Toast Notifications ── */
  #toast-container {
    position: fixed; bottom: 80px; right: 24px; z-index: 99999;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none;
  }
  .toast {
    min-width: 280px; max-width: 380px; padding: 14px 18px;
    border-radius: 14px; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,.18);
    pointer-events: all; cursor: pointer;
    animation: toastIn .35s cubic-bezier(.34,1.56,.64,1);
    transition: opacity .3s, transform .3s;
  }
  @keyframes toastIn { from { opacity:0; transform:translateX(60px) scale(.9);} to { opacity:1; transform:none;} }
  .toast.hide { opacity: 0; transform: translateX(60px) scale(.9); }
  .toast.success { background: #ECFDF5; border: 2px solid #6EE7B7; color: #065F46; }
  .toast.error   { background: #FEF2F2; border: 2px solid #FCA5A5; color: #7F1D1D; }
  .toast.info    { background: #EFF6FF; border: 2px solid #93C5FD; color: #1E3A5F; }
  .toast.warning { background: #FFFBEB; border: 2px solid #FCD34D; color: #78350F; }
  .toast-icon { font-size: 20px; flex-shrink: 0; }

  /* ── Loading Screen ── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 99998;
    background: linear-gradient(135deg, #78350F 0%, #451a03 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; transition: opacity .5s;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-logo-wrap {
    width: 90px; height: 90px; border-radius: 22px;
    background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center;
    font-size: 48px; margin-bottom: 24px; border: 2px solid rgba(255,255,255,.2);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.06);} }
  .loading-bar-wrap { width: 200px; height: 5px; background: rgba(255,255,255,.2); border-radius: 10px; margin-top: 28px; overflow: hidden; }
  .loading-bar { height: 100%; background: var(--amber); border-radius: 10px; animation: loadBar 1.8s ease-in-out infinite; }
  @keyframes loadBar { 0%{width:5%;}70%{width:90%;}100%{width:5%;} }

  /* ── Mobile Bottom Nav ── */
  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 2px solid var(--border);
    z-index: 1000; padding: 6px 0 env(safe-area-inset-bottom, 6px);
    box-shadow: 0 -4px 20px rgba(0,0,0,.1);
  }
  .mobile-nav-inner { display: flex; justify-content: space-around; }
  .mobile-nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 4px; background: none; border: none; cursor: pointer;
    font-size: 11px; color: var(--muted); font-family: 'DM Sans'; font-weight: 600;
    transition: color .18s;
  }
  .mobile-nav-btn.active { color: var(--gold); }
  .mobile-nav-btn .mnav-icon { font-size: 22px; }
  @media (max-width: 900px) {
    .mobile-nav { display: block; }
    .main { padding: 20px 16px 90px !important; }
    #toast-container { bottom: 90px; right: 12px; }
  }

  /* ── KPI Trend ── */
  .kpi-trend { font-size: 12px; font-weight: 700; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-flat { color: var(--muted); }

  /* ── Search bar ── */
  .search-bar {
    width: 100%; padding: 11px 16px; border: 2px solid var(--border);
    border-radius: 10px; font-family: 'DM Sans'; font-size: 14px;
    outline: none; transition: border-color .18s; background: var(--white);
    margin-bottom: 16px;
  }
  .search-bar:focus { border-color: var(--gold); }

  /* ── Enhanced client card ── */
  .whatsapp-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 11px; background: #25D366; color: white;
    border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none; margin-top: 8px;
    transition: background .18s;
  }
  .whatsapp-btn:hover { background: #128C7E; }

  /* ── Export btn ── */
  .btn-export {
    padding: 10px 18px; background: #1D4ED8; color: white;
    border: none; border-radius: 10px; font-family: 'Syne'; font-size: 13px;
    font-weight: 700; cursor: pointer; display: inline-flex; align-items: center;
    gap: 7px; transition: background .18s;
  }
  .btn-export:hover { background: #1E40AF; }

  /* ── Notification badge ── */
  .nav-badge {
    background: var(--red); color: white; font-size: 10px; font-weight: 800;
    padding: 2px 6px; border-radius: 20px; margin-left: auto;
  }

  /* ── Connection status indicator ── */
  #conn-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 99997;
    padding: 9px 20px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    transform: translateY(-100%); transition: transform .4s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  #conn-bar.show { transform: translateY(0); }
  #conn-bar.offline { background: #FEF2F2; border-bottom: 2px solid #FCA5A5; color: #7F1D1D; }
  #conn-bar.online  { background: #ECFDF5; border-bottom: 2px solid #6EE7B7; color: #065F46; }
  .conn-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    animation: connPulse 1.5s ease-in-out infinite;
  }
  .conn-dot.red  { background: #EF4444; }
  .conn-dot.green { background: #10B981; animation: none; }
  @keyframes connPulse { 0%,100%{opacity:1;}50%{opacity:.3;} }
  
  /* ── Sync indicator in sidebar ── */
  .sync-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .sync-badge.online  { background: rgba(16,185,129,.2); color: #6EE7B7; }
  .sync-badge.offline { background: rgba(239,68,68,.2);  color: #FCA5A5; animation: connPulse 1.5s ease-in-out infinite; }

  /* ══════════════════════════════════════

<body>
<div id="conn-bar">
  <div class="conn-dot" id="conn-dot"></div>
  <span id="conn-msg">Vérification de la connexion...</span>
</div>
<div id="loading-screen">
  <div class="loading-logo-wrap">🥖</div>
  <div style="font-family:'Syne';font-size:22px;font-weight:800;letter-spacing:-0.5px;">Boulangerie Bamba</div>
  <div style="font-size:13px;opacity:.7;margin-top:6px;">Chargement des données...</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>
<div id="toast-container"></div>
<div id="root"></div>

<!-- 🆕 V14 — Bouton mode nuit -->
<button class="dark-mode-toggle no-print" id="dark-mode-btn" title="Mode nuit">🌙</button>

<!-- 🆕 V14 — Bouton recherche globale -->
<button id="fab-search" class="no-print" title="Recherche rapide (Ctrl+K)">🔍</button>

<!-- 🆕 V14 — Panneau notifications -->
<div id="notif-panel">
  <div style="padding:20px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
    <h3 style="font-family:'Syne';font-size:18px;font-weight:800;margin:0;">🔔 Alertes & Notifications</h3>
    <button id="close-notif-panel" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
  </div>
  <div id="notif-list" style="overflow-y:auto;flex:1;"></div>
</div>
<div id="notif-overlay" style="display:none;position:fixed;inset:0;z-index:9994;background:rgba(0,0,0,.3);" id="notif-overlay"></div>

<script type="module">
// ════════════════════════════════════════════
// ☁️  FIREBASE REALTIME DATABASE
// ════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// ════════════════════════════════════════════
// 🛡️  HELPERS (définis en premier — utilisés partout)
// ════════════════════════════════════════════
function escHTML(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fcfa(n){ return new Intl.NumberFormat('fr-FR').format(n)+' FCFA'; }
function fdate(s){ return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}); }
function fdatetime(s){ return new Date(s).toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function uid(){ return '_'+(Date.now())+'_'+Math.random().toString(36).slice(2,7); }
function isToday(dateString) {
  if(!dateString) return false;
  const d = new Date(dateString);
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

const PAIN_PRIX = 130;        // FCFA par pain (boutiques)
const PAIN_PRIX_DETAIL = 150; // FCFA par pain (vente en route/détail)

// ════════════════════════════════════════════
// 🆕 V15 — MOTEUR DE VALIDATION CROISÉE
// ════════════════════════════════════════════

/**
 * Crée une demande de validation.
 * type: 'charge_livreur' | 'boutique_vendeur'
 * data: { chargeId, livreurId, livreurNom, chargeurNom, quantite, numCharge, periode, ... }
 */
function creerValidation(type, data) {
  if (!db.validations) db.validations = [];
  const v = {
    id: 'val_' + uid(),
    type,
    statut: 'en_attente', // 'en_attente' | 'confirmee' | 'contestee' | 'litige'
    ...data,
    createdAt: new Date().toISOString(),
    resolvedAt: null,
    qteContestee: null,
    commentaire: ''
  };
  db.validations.push(v);
  return v;
}

/** Retourne les validations en attente pour un destinataire */
function getValidationsEnAttente(destinataireId, type) {
  return (db.validations || []).filter(v =>
    v.statut === 'en_attente' &&
    v.destinataireId === destinataireId &&
    (!type || v.type === type)
  );
}

/** Retourne toutes les validations du jour (pour admin) */
function getValidationsAujourdhui() {
  return (db.validations || []).filter(v => isToday(v.createdAt));
}

/** Confirme une validation */
function confirmerValidation(valId) {
  const v = (db.validations || []).find(x => x.id === valId);
  if (!v) return;
  v.statut = 'confirmee';
  v.resolvedAt = new Date().toISOString();
  saveDB();
  showToast('✅ Charge confirmée ! Merci.', 'success', 4000);
  setState({});
}

/** Conteste une validation avec quantité corrigée */
function contesterValidation(valId, qteCorrigee, commentaire) {
  const v = (db.validations || []).find(x => x.id === valId);
  if (!v) return;
  v.statut = qteCorrigee === v.quantite ? 'confirmee' : 'contestee';
  v.qteContestee = qteCorrigee;
  v.commentaire = commentaire || '';
  v.resolvedAt = new Date().toISOString();
  // Si contestée, marquer comme litige si écart > 0
  if (qteCorrigee !== v.quantite) {
    v.statut = 'litige';
    showToast(`⚠️ Litige signalé : vous avez reçu ${qteCorrigee} pains, pas ${v.quantite}. L'admin a été notifié.`, 'warning', 6000);
  } else {
    showToast('✅ Quantité confirmée !', 'success', 4000);
  }
  saveDB();
  setState({});
}

/** Résout un litige (admin) */
function resoudreListige(valId, decision) {
  const v = (db.validations || []).find(x => x.id === valId);
  if (!v) return;
  v.statut = decision === 'accepter' ? 'litige_resolu_livreur' : 'litige_resolu_chargeur';
  v.resolvedAt = new Date().toISOString();
  saveDB();
  showToast('Litige résolu.', 'success');
  setState({});
}

/** Construit le bandeau de validation pour le livreur */
function buildValidationBannerLivreur(livreurId) {
  const pending = getValidationsEnAttente(livreurId, 'charge_livreur');
  if (!pending.length) return '';

  return `
  <div class="validation-banner">
    <div class="validation-banner-title">
      <span style="font-size:26px;animation:bannerPulse 1s ease-in-out infinite;">📬</span>
      ${pending.length} charge${pending.length > 1 ? 's' : ''} à confirmer
      <span style="font-size:13px;font-weight:600;opacity:.7;">— Le chargeur vous a donné du pain, veuillez confirmer la quantité reçue</span>
    </div>
    ${pending.map(v => `
    <div class="validation-item">
      <div style="text-align:center;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Quantité reçue</div>
        <div class="validation-item-qte">${v.quantite}</div>
        <div style="font-size:12px;color:var(--muted);">pains</div>
      </div>
      <div class="validation-item-info">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px;">📦 Charge n°${v.numCharge || 1} — ${v.periode === 'soir' ? '🌙 Soir' : '☀️ Matin'}</div>
        <div style="font-size:13px;color:var(--muted);">De : <strong>${escHTML(v.chargeurNom)}</strong></div>
        <div style="font-size:12px;color:var(--muted);">à ${new Date(v.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>

const IDB_NAME = 'BoulangerieBamba_Offline';
const IDB_STORE = 'db_store';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function idbSave(data) {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readwrite');
      const store = tx.objectStore(IDB_STORE);
      store.put(JSON.parse(JSON.stringify(data)), 'main');
      store.put(new Date().toISOString(), 'lastSave');
      tx.oncomplete = resolve;
      tx.onerror = e => reject(e.target.error);
    });
  } catch(e) {
    console.error('IndexedDB save error:', e);
  }
}

async function idbLoad() {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('main');
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  } catch(e) {
    console.error('IndexedDB load error:', e);
    return null;
  }
}

function setConnectionUI(online, syncing = false) {
  isOnline = online;
  const bar = document.getElementById('conn-bar');
  const dot = document.getElementById('conn-dot');
  const msg = document.getElementById('conn-msg');
  if(!bar) return;

  if(syncing) {
    bar.className = 'conn-bar show online';
    bar.style.cssText = 'background:#FFFBEB;border-bottom:2px solid #FCD34D;color:#78350F;';
    if(dot) { dot.className = 'conn-dot'; dot.style.background = '#F59E0B'; }
    if(msg) msg.textContent = '⏳ Synchronisation en cours avec le cloud...';
    bar.classList.add('show');
    return;
  }

  if(online) {
    bar.className = 'conn-bar show online';
    if(dot) { dot.className = 'conn-dot green'; dot.style.background = '#10B981'; }
    if(msg) msg.textContent = '🟢 Connecté — Données synchronisées avec le cloud';
    bar.classList.add('show');
    setTimeout(() => bar.classList.remove('show'), 4000);
  } else {
    bar.className = 'conn-bar show offline';
    if(dot) { dot.className = 'conn-dot red'; dot.style.background = '#EF4444'; }
    if(msg) msg.textContent = '🔴 Hors ligne — Vos données sont sauvegardées localement';
    bar.classList.add('show');
  }

  // Update sync badge in sidebar
  updateSyncBadge(online);
}

function updateSyncBadge(online) {
  const badge = document.getElementById('sync-status-badge');
  if(!badge) return;
  if(online) {
    badge.className = 'sync-badge online';
    badge.innerHTML = '🟢 En ligne';
  } else {
    badge.className = 'sync-badge offline';
    badge.innerHTML = '🔴 Hors ligne';
  }
}

// Firebase .info/connected — détection RÉELLE de la connexion Firebase
const connectedRef = ref(database, '.info/connected');
let prevConnected = null;

onValue(connectedRef, async (snap) => {
  const connected = snap.val() === true;
  
  if(connected === prevConnected) return;
  
  if(connected && prevConnected === false) {
    // Reconnexion détectée !
    setConnectionUI(true, true);
    pendingSync = true;
    
    try {
      // Envoyer les données locales vers Firebase (elles peuvent être plus récentes)
      await set(dbRef, db);
      pendingSync = false;
      setConnectionUI(true, false);
      showToast('✅ Synchronisation terminée ! Toutes vos données sont à jour.', 'success', 5000);
    } catch(e) {
      pendingSync = false;
      setConnectionUI(true, false);
    }
  } else if(!connected && prevConnected !== false) {
    // Déconnexion détectée
    setConnectionUI(false);
    showToast('📴 Mode hors-ligne activé. Continuez à travailler normalement !', 'warning', 6000);
  } else if(connected && prevConnected === null) {
    // Premier chargement connecté
    setConnectionUI(true, false);
  }
  
  prevConnected = connected;
});

// ════════════════════════════════════════════

// Timeout : si Firebase ne répond pas en 5s, utiliser le cache local
let firebaseDataReceived = false;
const firebaseTimeout = setTimeout(async () => {
  if(!firebaseDataReceived) {
    console.log('Firebase timeout — chargement depuis le cache local...');
    const cached = await idbLoad();
    if(cached) {
      db = cached;
      normalizeDB();
      showToast('📱 Données chargées depuis le cache local (hors ligne)', 'warning', 5000);
    }
    if(!window.isAppInitialized) {
      render();
      window.isAppInitialized = true;
    }
  }
}, 5000);

onValue(dbRef, async (snapshot) => {
  firebaseDataReceived = true;
  clearTimeout(firebaseTimeout);
  
  const data = snapshot.val();
  if (data) {
    db = data;
    normalizeDB();
    // Mettre à jour le cache local
    await idbSave(db);
  } else {
    // Vérifier si on a un cache local
    const cached = await idbLoad();
    if(cached) {
      db = cached;
      normalizeDB();
    } else {
      db = defaultDB;
    }
    saveDB();
  }

  if (window.isAppInitialized) {
    render();
  }
});

function saveDB() {
  // 1. Toujours sauvegarder localement en premier (instantané)

}

function showToast(msg, type='success', duration=3500) {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const container = document.getElementById('toast-container');
  if(!container) return;
  const t2 = document.createElement('div');
  t2.className = `toast ${type}`;
  t2.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  t2.onclick = () => removeToast(t2);
  container.appendChild(t2);
  setTimeout(() => removeToast(t2), duration);
}
function removeToast(el) {
  el.classList.add('hide');
  setTimeout(() => el.remove(), 350);
}

let clockInterval = null;
function startClock() {
  if(clockInterval) clearInterval(clockInterval);
  const el = document.getElementById('live-clock');
  if(!el) return;
  const tick = () => {
    el.textContent = new Date().toLocaleString('fr-FR', {
      weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
    });
  };
  tick();
  clockInterval = setInterval(tick, 30000);
}

function doLogin(){
  const u = document.getElementById('inp-user').value.toLowerCase().trim();
  const p = document.getElementById('inp-pass').value;
  const user = db.users[u];
  if(user && user.password === p){
    // Super Admin : accès sans licence nécessaire
    if(user.role === 'superadmin') {
      setState({ user:{username:u,...user}, fUsername:u, fPassword:'', loginError:'',
        view:'superadmin', superAdminTab:'licenses' });
      return;
    }
    // Vérification de licence pour les admins
    if(user.role === 'admin') {
      const lic = (db.licenses||{})[u];
      if(lic) {
        if(!lic.active) {
          setState({ loginError: '🚫 Votre licence est désactivée. Contactez le Super Admin.', fUsername: u });
          return;
        }
        if(lic.expiresAt && new Date(lic.expiresAt) < new Date()) {
          setState({ loginError: `⏰ Votre licence a expiré le ${fdate(lic.expiresAt)}. Contactez le Super Admin.`, fUsername: u });
          return;
        }
      }
    }
    // Enregistrer l'historique de connexion pour admin, chargeur, vendeur
    if(['admin','chargeur','vendeur'].includes(user.role)) {
      if(!db.loginHistory) db.loginHistory = [];
      db.loginHistory.unshift({
        id: 'log_' + uid(),
        username: u,
        userNom: user.nom,
        userRole: user.role,
        loginAt: new Date().toISOString()
      });
      // Limiter à 2000 entrées max
      if(db.loginHistory.length > 2000) db.loginHistory = db.loginHistory.slice(0, 2000);
      saveDB();
    }
    let view = 'livreur';
    if(user.role === 'admin') view = 'admin';
    else if(user.role === 'chargeur') view = 'chargeur';
    else if(user.role === 'vendeur') view = 'vendeur';
    setState({ user:{username:u,...user}, fUsername:u, fPassword:'', loginError:'',
      view, adminTab:'overview' });
  } else {
    setState({ loginError:'Identifiants incorrects', fUsername:u });
  }
}

// 📊  CALCULS
// ════════════════════════════════════════════
function calcAdminStats(){
  const today = new Date(); today.setHours(0,0,0,0);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  let ventesMonth=0, painsToday=0, creances=0, retoursToday=0;
  let totalSortisToday = 0;
  let depensesMonth = 0;
  const week=[];
  
  for(let i=6;i>=0;i--){
    const d=new Date(today - i*86400000);
    week.push({jour:d.toLocaleDateString('fr-FR',{weekday:'short'}),montant:0,pains:0});
  }
  const perfLiv={};
  const recents=[];

  db.livraisons.forEach(liv=>{
    recents.push(liv);
    if(liv.statut === 'en_cours') return;

    const ld=new Date(liv.date); ld.setHours(0,0,0,0);
    if(ld>=monthStart) ventesMonth+=liv.montant;
    if(ld.getTime()===today.getTime()) {
        painsToday+=liv.vendu;
        retoursToday+=liv.restant;
    }
    const diff=Math.round((today-ld)/86400000);
    if(diff>=0&&diff<7){ week[6-diff].montant+=liv.montant; week[6-diff].pains+=liv.vendu; }
    if(!perfLiv[liv.livreur]) perfLiv[liv.livreur]={nom:liv.livreur,ventes:0};
    perfLiv[liv.livreur].ventes+=liv.montant;
  });

  db.stocks.forEach(s => {
    if(isToday(s.date)) totalSortisToday += s.quantite;
  });

  (db.depenses || []).forEach(d => {
      const ld = new Date(d.date); ld.setHours(0,0,0,0);
      if(ld >= monthStart) depensesMonth += Number(d.montant);
  });

  Object.values(db.clients).forEach(c=>{ creances+=c.creance||0; });

  const beneficeMonth = ventesMonth - depensesMonth;

  // Dons du mois
  const donsMonth = (db.dons||[]).filter(d => { const ld=new Date(d.date); ld.setHours(0,0,0,0); return ld>=monthStart; }).reduce((a,d)=>a+d.quantite,0);

  return {
    ventesMonth, depensesMonth, beneficeMonth, painsToday, creances, retoursToday, totalSortisToday, donsMonth,
    clientsActifs: Object.keys(db.clients).length,
    week, perfLiv: Object.values(perfLiv),
    recents: recents.sort((a,b)=>new Date(b.date)-new Date(a.date))
  };
}

function calcLivreurStats(username){
  let stockAuj = 0;
  let caAuj = 0;
  let livsMois = 0;
  let caMois = 0;
  let chargesDetail = [];
  
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1);

  db.stocks.forEach(s => {
    if(s.livreur === username && isToday(s.date)) {
      stockAuj += s.quantite;
      chargesDetail.push(s);
    }
  });

  // Trier par date
  chargesDetail.sort((a,b) => new Date(a.date) - new Date(b.date));
  // Renuméroter si besoin
  chargesDetail.forEach((s,i) => { if(!s.numCharge) s.numCharge = i+1; });

  db.livraisons.forEach(l => {
    if(l.livreur === username && l.statut === 'terminee'){ 
      if(new Date(l.date) >= monthStart){ livsMois++; caMois+=l.montant; }
      if(isToday(l.date)){ caAuj += l.montant; }
    }
  });
  return { livsMois, caMois, stockAuj, caAuj, nbCharges: chargesDetail.length, chargesDetail };
}

function calcRapport(periode){
  let start;
  const today=new Date(); today.setHours(0,0,0,0);
  if(periode==="aujourd'hui") start=today;
  else if(periode==='semaine') start=new Date(today-7*86400000);
  else if(periode==='mois') start=new Date(today.getFullYear(),today.getMonth(),1);
  else start=new Date(0);
  
  let tL=0,tV=0,tR=0,tCA=0; const pl={};
  const livraisons = [];
  db.livraisons.forEach(liv=>{
    if(new Date(liv.date)<start || liv.statut === 'en_cours') return;
    const l=liv.matin+liv.soir;
    tL+=l; tV+=liv.vendu; tR+=liv.restant; tCA+=liv.montant;
    if(!pl[liv.livreur]) pl[liv.livreur]={livreur:liv.livreur,nb:0,l:0,v:0,ca:0};
    pl[liv.livreur].nb++; pl[liv.livreur].l+=l;
    pl[liv.livreur].v+=liv.vendu; pl[liv.livreur].ca+=liv.montant;
    livraisons.push(liv);
  });
  livraisons.sort((a,b)=>new Date(b.date)-new Date(a.date));
  // Aliases for backward compat
  const r = { tL,tV,tR,tCA, pl:Object.values(pl).map(x=>({...x,taux:x.l>0?(x.v/x.l*100):0, clients:x.nb, vendus:x.v})), livraisons };
  r.ca = tCA; r.vendus = tV; r.retours = tR; r.sortis = tL;
  return r;
}

function buildBarChart(data, key='montant'){
  if(!data.length) return '<div class="empty"><div class="empty-icon">📊</div><p>Pas de données</p></div>';
  const max=Math.max(...data.map(d=>d[key]),1);
  return `<div class="bar-chart">
    ${data.map(d=>`
    <div class="bar-item">
      <div class="bar-fill" style="height:${Math.max(4,Math.round((d[key]/max)*160))}px" title="${fcfa(d[key])}"></div>
      <div class="bar-label">${d.jour||d.nom||''}</div>
    </div>`).join('')}
  </div>`;
}

function buildLineChart(data, key='montant'){
  if(!data.length) return '';
  const W=500,H=160,pad=10;
  const max=Math.max(...data.map(d=>d[key]),1);
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1||1))*(W-pad*2);
    const y=H-pad-(d[key]/max)*(H-pad*2);
    return {x,y,v:d[key]};
  });
  const path='M'+pts.map(p=>`${p.x},${p.y}`).join(' L');
  const area=path+` L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:180px;">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${'#F59E0B'}" stop-opacity=".3"/>
        <stop offset="100%" stop-color="${'#F59E0B'}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${path}" fill="none" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#D97706" stroke="#fff" stroke-width="2"/>`).join('')}
  </svg>`;
}

function kpi(icon,label,value,color){
  return `<div class="kpi">

}

function buildChargementTab(){
  const chargeurs = Object.entries(db.users)
    .filter(([,u]) => u.role === 'chargeur')
    .map(([username, u]) => ({username, ...u}));

  const livreurs = Object.entries(db.users)
    .filter(([,u]) => u.role === 'livreur')
    .map(([username, u]) => ({username, ...u}));

  const today = new Date(); today.setHours(0,0,0,0);
  const chargesAuj = (db.charges||[]).filter(c => new Date(c.date) >= today);
  const totalChargeAuj = chargesAuj.reduce((a,c) => a + c.quantite, 0);

  // Résumé par livreur aujourd'hui
  const recapLivreurs = {};
  chargesAuj.forEach(c => {
    if(!recapLivreurs[c.livreur]) recapLivreurs[c.livreur] = { charges:[], total:0 };
    recapLivreurs[c.livreur].charges.push(c);
    recapLivreurs[c.livreur].total += c.quantite;
  });

  // Production du jour (depuis productions)
  const prodAuj = (db.productions||[]).filter(p => isToday(p.date)).reduce((a,p)=>a+p.quantite, 0);

  return `
  <div class="page-header">
    <h1 class="page-title" style="margin:0;">📦 Suivi du Chargement</h1>
    <button class="btn-primary" id="btn-new-chargeur" style="background:linear-gradient(135deg,#1D4ED8,#3B82F6);box-shadow:0 4px 14px rgba(29,78,216,.3);">➕ Nouveau Chargeur</button>
  </div>

  <div class="kpi-grid" style="margin-bottom:24px;">
    ${kpi('🥖','Production déclarée (Auj.)',prodAuj.toString(),'var(--amber)')}
    ${kpi('📦','Pains chargés pour livreurs',totalChargeAuj.toString(),'#1D4ED8')}
    ${kpi('🚚','Livreurs chargés (Auj.)',Object.keys(recapLivreurs).length.toString(),'var(--gold)')}
    ${kpi('🧑‍🏭','Chargeurs actifs',chargeurs.length.toString(),'var(--green)')}
  </div>

  <div class="card" style="margin-bottom:24px;">
    <div class="card-title">🗓️ Charges du jour — par livreur</div>
    ${!Object.keys(recapLivreurs).length ? `<div class="empty" style="padding:24px;"><div class="empty-icon">📋</div><p>Aucune charge enregistrée aujourd'hui</p></div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
      ${livreurs.map(liv => {
        const r = recapLivreurs[liv.username];
        if(!r) return `
        <div style="background:var(--bg);border-radius:12px;padding:16px;border:1px solid var(--border);opacity:.6;">
          <div style="font-weight:700;font-size:15px;margin-bottom:8px;">🚚 ${escHTML(liv.nom)}</div>
          <div style="font-size:13px;color:var(--muted);">Pas encore chargé</div>
        </div>`;
        return `
        <div style="background:var(--white);border-radius:12px;padding:16px;border:2px solid #BFDBFE;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-weight:700;font-size:15px;">🚚 ${escHTML(liv.nom)}</div>
            <span style="background:#DBEAFE;color:#1D4ED8;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;">${r.total} pains</span>
          </div>
          ${r.charges.sort((a,b)=>a.numCharge - b.numCharge).map((ch,i) => `
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px dashed var(--border);">
            <span style="color:var(--muted);">C${ch.numCharge||i+1} (${ch.periode||'Matin'}) · ${new Date(ch.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
            <strong>${ch.quantite} pains</strong>
          </div>`).join('')}
          <div style="font-size:11px;color:var(--muted);margin-top:6px;">Par : ${escHTML(r.charges[0].chargeurNom)}</div>
        </div>`;
      }).join('')}
    </div>`}
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <div style="padding:18px 20px 0;font-size:16px;font-weight:700;">📋 Historique des Charges (7 derniers jours)</div>
    <table class="data-table">
      <thead><tr>
        <th>Date & Heure</th><th>Livreur</th><th>N° Charge</th><th>Période</th><th>Quantité</th><th>Enregistré par</th>
      </tr></thead>
      <tbody>
        ${!(db.charges||[]).length ? `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted);">Aucune charge enregistrée</td></tr>` : ''}
        ${(db.charges||[])
          .filter(c => new Date(c.date) >= new Date(Date.now() - 7*86400000))
          .sort((a,b) => new Date(b.date)-new Date(a.date))
          .map(c => `<tr>
            <td style="font-size:13px;color:var(--muted);">${fdatetime(c.date)}</td>
            <td><strong>${escHTML(c.livreurNom||c.livreur)}</strong></td>
            <td><span class="badge" style="background:var(--bg);color:var(--dark);">Charge ${c.numCharge||1}</span></td>
            <td><span class="badge" style="background:#FEF3C7;color:#92400E;">${c.periode === 'soir' ? '🌙 Soir' : '☀️ Matin'}</span></td>
            <td><span style="font-family:'Syne';font-size:16px;font-weight:800;color:#1D4ED8;">${c.quantite}</span></td>
            <td style="font-size:13px;">${escHTML(c.chargeurNom||c.chargeur)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>

  <div class="card" style="margin-top:24px;">
    <div class="card-title">🧑‍🏭 Comptes Chargeurs</div>
    ${!chargeurs.length ? `<div class="empty" style="padding:24px;"><div class="empty-icon">🧑‍🏭</div><p>Aucun chargeur créé. Cliquez sur "Nouveau Chargeur" pour commencer.</p></div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
      ${chargeurs.map(ch => `
      <div style="background:var(--bg);border-radius:12px;padding:16px;border:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">
          <div style="width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#1D4ED8,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🧑‍🏭</div>
          <div>
            <div style="font-weight:700;font-size:15px;">${escHTML(ch.nom)}</div>
            <div style="font-size:12px;color:var(--muted);">@${escHTML(ch.username)}</div>
          </div>
        </div>
        <button class="btn-switch-view btn-primary" data-username="${escHTML(ch.username)}" data-role="chargeur" style="width:100%;justify-content:center;font-size:13px;padding:9px;background:linear-gradient(135deg,#1D4ED8,#3B82F6);box-shadow:0 4px 14px rgba(29,78,216,.25);">
          👁️ Voir l'espace chargeur
        </button>
      </div>`).join('')}
    </div>`}
  </div>`;
}

  ${(db.dons||[]).length ? `

          <td style="color:var(--muted);font-size:13px;">${escHTML(d.description||'')}</td>
        </tr>`).join('')}
        <tr style="background:var(--bg);">
          <td colspan="2"><strong>Total général</strong></td>
          <td class="right"><strong style="color:var(--green);">${(db.dons||[]).reduce((a,d)=>a+d.quantite,0)} pains</strong></td>
          <td></td>

          let statusBadge = '<span class="badge" style="background:#E5E7EB;color:#374151;">▶️ À démarrer</span>';
          let cardStyle = 'border-color: var(--border);';
          
          if(livToday) {
            if(livToday.statut === 'en_cours') {
              const nbCharges = livToday.depots ? livToday.depots.filter(d=>d.qte>0).length : (livToday.matin||livToday.soir ? 1 : 0);
              const totalDep = livToday.matin + livToday.soir;
              statusBadge = `<span class="badge" style="background:#FEF3C7;color:#D97706;">⏳ En cours · ${nbCharges}C · ${totalDep} pains</span>`;

              statusBadge = `<span class="badge" style="background:#F0FDF4;color:#059669;">✅ Clôturé (${livToday.vendu} vendus)</span>`;
              cardStyle = 'border-color: var(--green); opacity: 0.8;';

          return `
          <div class="client-card action-client-card" style="${cardStyle} cursor:pointer;" data-id="${c.id}">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
              <strong style="font-size:15px;">${escHTML(c.nom)}</strong>
              ${statusBadge}

              ${c.creance && c.creance < 0 ? `<br><span style="color:var(--green); font-weight:700; display:inline-block; margin-top:4px;">✅ Avoir : ${fcfa(Math.abs(c.creance))}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>

  </div>
  ${buildModal()}`;
}

function actionCard(icon,title,desc,id){
  return `<button id="${id}" style="
    background:var(--white);border:2px solid var(--border);border-radius:14px;
    padding:22px;cursor:pointer;text-align:start;width:100%;
    transition:transform .2s,box-shadow .2s,border-color .2s;
    box-shadow:0 4px 14px rgba(0,0,0,.05);
    font-family:'DM Sans';
  " onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 10px 24px rgba(217,119,6,.15)';this.style.borderColor='var(--gold)';"
     onmouseout="this.style.transform='';this.style.boxShadow='0 4px 14px rgba(0,0,0,.05)';this.style.borderColor='var(--border)';">
    <div style="font-size:38px;margin-bottom:12px;">${icon}</div>
    <div style="font-family:'Syne';font-size:17px;font-weight:700;margin-bottom:5px;">${title}</div>
    <div style="font-size:13px;color:var(--muted);">${desc}</div>
  </button>`;
}

/** Retourne les clients propres au chargeur connecté */
function getClientsChargeur() {
  const uname = state.user.username;

  return ids.map(id => ({ id, ...db.clients[id] })).filter(c => c.nom);
}

function buildChargeur(){
  const u = state.user;
  const livreurs = Object.entries(db.users)
    .filter(([,usr]) => usr.role === 'livreur')
    .map(([username, usr]) => ({username, ...usr}));

  const today = new Date(); today.setHours(0,0,0,0);
  
  // Total pains chargés aujourd'hui
  const chargesAuj = (db.charges||[]).filter(c => {
    const d = new Date(c.date); d.setHours(0,0,0,0);
    return d.getTime() === today.getTime();
  });
  const totalAuj = chargesAuj.reduce((a,c)=>a+c.quantite,0);

  // Par livreur today
  const parLivreur = {};
  chargesAuj.forEach(c => {
    if(!parLivreur[c.livreur]) parLivreur[c.livreur] = { charges:[], total:0 };
    parLivreur[c.livreur].charges.push(c);
    parLivreur[c.livreur].total += c.quantite;
  });

  // Total production aujourd'hui
  const prodAuj = (db.productions||[]).filter(p => isToday(p.date)).reduce((a,p)=>a+p.quantite, 0);

  // ── Boutiques data ──
  const boutiques = Object.entries(db.boutiques || {});
  const chargesBoutiquesAuj = (db.chargesBoutiques||[]).filter(c => isToday(c.date));
  const totalBoutiqueAuj = chargesBoutiquesAuj.reduce((a,c) => a + c.lignes.reduce((s,l)=>s+l.quantite,0), 0);

  // Résumé par boutique aujourd'hui
  const parBoutique = {};
  chargesBoutiquesAuj.forEach(c => {
    if(!parBoutique[c.boutiqueId]) parBoutique[c.boutiqueId] = { charges:[], totalArticles:0 };
    parBoutique[c.boutiqueId].charges.push(c);
    c.lignes.forEach(l => { parBoutique[c.boutiqueId].totalArticles += l.quantite; });
  });

  return `
  <div class="main fade-in" style="max-width:960px;margin:0 auto;padding-bottom:20px;">
    ${state.adminPrev ? `
    <div style="background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:14px;padding:14px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 16px rgba(29,78,216,.3);">
      <div style="color:white;display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;">👁️</span>
        <div>
          <div style="font-weight:800;font-size:14px;">Mode Aperçu Admin</div>
          <div style="font-size:12px;opacity:.85;">Vous voyez l'espace de <strong>${escHTML(u.nom)}</strong></div>
        </div>
      </div>
      <button id="btn-retour-admin" style="padding:10px 20px;background:white;color:#1D4ED8;border:none;border-radius:10px;font-family:'Syne';font-size:14px;font-weight:800;cursor:pointer;">← Retour Admin</button>
    </div>` : ''}
    <div class="chargeur-header">
      <div>
        <div style="font-size:13px;opacity:.85;margin-bottom:5px;">Espace Chargeur — ${escHTML(db.settings.nom)}</div>
        <h1 style="font-family:'Syne';font-size:26px;font-weight:800;letter-spacing:-1px;">📦 ${escHTML(u.nom)}</h1>
        <div id="live-clock" style="font-size:12px;opacity:.75;margin-top:4px;"></div>
      </div>
      <div style="text-align:right;">
        <button class="btn-logout" id="btn-logout" style="width:auto;padding:10px 20px;margin-top:10px;">Déconnexion</button>
      </div>
    </div>

    <div class="kpi-grid" style="margin-bottom:24px;">
      ${kpi('🥖','Production déclarée (Auj.)',prodAuj.toString(),'var(--amber)')}
      ${kpi('📦','Pains chargés livreurs',totalAuj.toString(),'#1D4ED8')}
      ${kpi('🛍️','Articles envoyés boutiques',totalBoutiqueAuj.toString(),'#7C3AED')}
      ${kpi('🚚','Livreurs chargés',Object.keys(parLivreur).length+'/'+livreurs.length,'var(--gold)')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;">
      <button class="btn-primary" id="btn-declarer-production" style="padding:18px;font-size:15px;justify-content:center;border-radius:14px;background:linear-gradient(135deg,var(--green),#047857);box-shadow:0 4px 14px rgba(5,150,105,.3);">
        🥖 Déclarer Production

      <button class="btn-charge" id="btn-nouvelle-charge" style="padding:18px;font-size:15px;justify-content:center;border-radius:14px;">

            ${r.charges.slice(-1)[0].lignes.map(l=>`

function buildModal(){

  // ── Boutique / Vendeur modals ──
  const boutiqueModals = ['addBoutique','addVendeur','gererBoutique','rapportBoutique','saisirJournee','gererProduitsVendeur'];
  if (boutiqueModals.includes(state.modal)) {
    const inner = buildBoutiqueModals();
    return inner ? `<div class="modal-backdrop" id="modal-backdrop">
      <div class="modal-box" style="max-width:580px;">
        <button class="modal-close modal-close-btn">✕</button>
        ${inner}

  // ── Approvisionner boutique (Chargeur) ──
  if(state.modal === 'chargerBoutique') return buildChargerBoutiqueModal();

  // ── Don de pain (Livreur) ──

      .sort((a,b) => new Date(a.date) - new Date(b.date));

    // Dépôts existants pour ce client
    const depotsExistants = state.activeLiv ? (state.activeLiv.depots || []) : [];
    
    // Retours existants
    const r = (state.activeLiv && state.activeLiv.statut === 'terminee') ? state.activeLiv.restant : '';
    const p = (state.activeLiv && state.activeLiv.paye !== undefined) ? state.activeLiv.paye : '';
    const rEntier = r !== '' ? Math.floor(r) : '';
    const rDemi = r !== '' ? ((r % 1) !== 0 ? 1 : 0) : '';

    // Total déposé
    const totalDeposeActuel = depotsExistants.reduce((acc,d) => acc + d.qte, 0);

    // Section dépôts par charge
    let depotsSection = '';
    if(chargesAuj.length === 0) {
      depotsSection = `
      <div style="background:#FEF3C7; border-radius:10px; padding:14px; text-align:center; color:#92400E; font-size:13px; border:1px solid #FCD34D;">
        ⚠️ Aucune prise de stock déclarée aujourd'hui.<br>
        <strong>Déclarez d'abord vos pains à la boulangerie.</strong>
      </div>`;
    } else {
      depotsSection = `
      <div style="font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;">📦 Dépôts par charge</div>`;
      
      chargesAuj.forEach((stock, i) => {
        const numCharge = stock.numCharge || (i + 1);
        const heure = new Date(stock.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const depotExist = depotsExistants.find(d => d.chargeId === stock.id);
        const valeurActuelle = depotExist ? depotExist.qte : '';

        depotsSection += `
        <div style="background:var(--bg); border-radius:10px; padding:12px 14px; margin-bottom:10px; border:1px solid var(--border);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-weight:700; font-size:14px;">🥖 Charge ${numCharge}</span>
            <span style="font-size:11px; color:var(--muted);">⏰ Prise à ${heure} · ${stock.quantite} pains disponibles</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <label style="font-size:12px; color:var(--muted); white-space:nowrap;">Déposé ici :</label>
            <input id="depot-${stock.id}" data-charge-id="${stock.id}" data-num="${numCharge}" 
              class="form-input depot-input" type="number" min="0" 
              placeholder="0" value="${valeurActuelle}"
              style="flex:1; font-weight:700; font-size:16px; text-align:center;">
            <span style="font-size:12px; color:var(--muted); white-space:nowrap;">pains</span>
          </div>
        </div>`;
      });

      if(totalDeposeActuel > 0) {
        depotsSection += `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--cream); border-radius:8px; font-weight:700; font-size:14px; margin-bottom:4px; border:1px solid var(--border);">
          <span>📊 Total déposé chez ce client</span>
          <span id="total-depose-display" style="color:var(--brown);">${totalDeposeActuel} pains</span>
        </div>`;
      } else {
        depotsSection += `<div id="total-depose-display-wrap" style="display:none;">
          <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--cream); border-radius:8px; font-weight:700; font-size:14px; margin-bottom:4px; border:1px solid var(--border);">
            <span>📊 Total déposé chez ce client</span>
            <span id="total-depose-display" style="color:var(--brown);">0 pains</span>
          </div>
        </div>`;
      }
    }

    inner=`
    <div class="modal-title">📦 Fiche Journalière : ${escHTML(c.nom)}</div>
    <div style="font-size:13px; color:var(--muted); margin-bottom:18px;">Renseignez les dépôts pour chaque charge. Clôturez en fin de journée avec les invendus et l'encaissement.</div>
    
    ${isClosed ? `<div class="alert-success" style="padding:10px; margin-bottom:15px; font-weight:bold;">✅ Cette journée est clôturée. Vous pouvez modifier en cas d'erreur.</div>` : ''}

    <div style="margin-bottom:20px; border:2px solid var(--border); border-radius:12px; padding:16px;">
      ${depotsSection}
    </div>
    
    <div class="form-group" style="margin-top:5px; border-top:1px solid var(--border); padding-top:15px;">
      <label class="form-label">↩️ Retours (Invendus) — Fin de journée</label>
      <div class="form-row">
        <div>
          <span style="font-size:11px; color:var(--muted);">Pains entiers</span>
          <input id="m-restant-entier" class="form-input" type="number" min="0" placeholder="0" value="${rEntier}">
        </div>
        <div>
          <span style="font-size:11px; color:var(--muted);">Demi-pains (Moitiés)</span>
          <input id="m-restant-demi" class="form-input" type="number" min="0" placeholder="0" value="${rDemi}">
        </div>
      </div>
    </div>
    
    <div class="form-group" id="group-paiement" style="display:none; margin-top:15px; border-top:2px dashed var(--border); padding-top:15px;">
      <label class="form-label" style="color:var(--green); font-size:14px;">💰 Montant encaissé (FCFA)</label>
      <input id="m-paye" class="form-input" type="number" min="0" placeholder="Ex: 1500" value="${p}">
      <div style="font-size:12px; color:var(--muted); margin-top:4px;">Laissez vide ou mettez 0 s'il ne paie rien aujourd'hui. L'impayé s'ajoutera à sa dette.</div>
    </div>

    <div id="fiche-preview" class="alert-success" style="background:var(--bg); border-color:var(--border); color:var(--dark); display:none;"></div>

    <div id="modal-error" style="display:none;" class="alert-error"></div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn-secondary" id="btn-save-draft">💾 Sauvegarder Brouillon</button>
      <button class="btn-primary" id="btn-cloture-liv">✅ Clôturer la journée</button>
    </div>`;
  }

  return inner ? `<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-box">
      <button class="modal-close modal-close-btn">✕</button>
      ${inner}
    </div>
  </div>` : '';
}

// 🏪  MODAL APPROVISIONNER BOUTIQUE (Chargeur)
// ════════════════════════════════════════════
function buildChargerBoutiqueModal() {
  if(state.modal !== 'chargerBoutique') return '';
  const boutiques = Object.entries(db.boutiques || {});
  if(!boutiques.length) return '';

  const activeBoutique = state.activeBoutiqueId ? db.boutiques[state.activeBoutiqueId] : null;
  const produits = activeBoutique ? (activeBoutique.produits || []) : [];

  const boutiqueSelect = `
  <div class="form-group">
    <label class="form-label">Boutique à approvisionner *</label>
    <select id="cb-boutique" class="form-select" onchange="onSelectBoutique(this.value)">
      <option value="">-- Choisir une boutique --</option>
      ${boutiques.map(([id, b]) => `<option value="${id}" ${state.activeBoutiqueId === id ? 'selected' : ''}>${escHTML(b.nom)}</option>`).join('')}
    </select>
  </div>`;

  let produitsSection = '';
  if(activeBoutique && produits.length > 0) {
    produitsSection = `
    <div style="background:#F5F3FF; border-radius:12px; padding:16px; border:2px solid #DDD6FE; margin-top:4px;">
      <div style="font-size:12px; font-weight:700; color:#7C3AED; text-transform:uppercase; letter-spacing:.5px; margin-bottom:14px;">📦 Quantités à livrer</div>
      ${produits.map((p, i) => `
      <div style="display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px dashed #DDD6FE;">
        <div style="flex:1;">
          <div style="font-weight:700; font-size:14px;">${escHTML(p.nom)}</div>
          <div style="font-size:12px; color:var(--muted);">${fcfa(p.prix)} · ${escHTML(p.categorie || '')}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="number" id="cb-qte-${i}" data-idx="${i}" data-produit-id="${p.id || i}" data-produit-nom="${escHTML(p.nom)}" data-prix="${p.prix}"
            class="form-input cb-qte-input" min="0" placeholder="0" 
            style="width:90px; text-align:center; font-weight:700; font-size:16px;">
          <span style="font-size:12px; color:var(--muted); white-space:nowrap;">unités</span>
        </div>
      </div>`).join('')}
      <div id="cb-total-wrap" style="display:none; margin-top:12px; padding:10px 14px; background:#EDE9FE; border-radius:8px; font-weight:700; font-size:14px; color:#7C3AED;">
        📊 Total : <span id="cb-total-articles">0</span> articles
      </div>
    </div>`;
  } else if(activeBoutique && produits.length === 0) {
    produitsSection = `<div style="background:#FEF3C7; border-radius:10px; padding:14px; text-align:center; color:#92400E; font-size:13px; border:1px dashed #FCD34D; margin-top:8px;">⚠️ Cette boutique n'a aucun produit dans son catalogue. L'admin doit d'abord en ajouter.</div>`;
  }

  return `<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-box" style="max-width:520px;">
      <button class="modal-close modal-close-btn">✕</button>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
        <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🛍️</div>
        <div>
          <div class="modal-title" style="color:#7C3AED;margin-bottom:2px;">Approvisionner une Boutique</div>
          <div style="font-size:12px;color:var(--muted);">Renseignez les quantités envoyées à la boutique.</div>
        </div>
      </div>
      <hr style="border:none;border-top:2px solid #EDE9FE;margin:16px 0;"/>
      ${boutiqueSelect}
      ${produitsSection}
      <div id="modal-error" style="display:none; margin-top:12px;" class="alert-error"></div>
      <div class="form-actions" style="margin-top:18px;">
        <button class="btn-secondary modal-close-btn">Annuler</button>
        ${activeBoutique && produits.length > 0 ? `<button class="btn-primary" id="btn-save-charger-boutique" style="background:linear-gradient(135deg,#7C3AED,#A78BFA);box-shadow:0 4px 14px rgba(124,58,237,.3);flex:1;justify-content:center;">✅ Confirmer la livraison</button>` : ''}
      </div>
    </div>
  </div>`;
}

function buildDonPainModal() {
  if(state.modal !== 'donPain') return '';
  const donsAuj = (db.dons || []).filter(d => isToday(d.date) && d.livreur === state.user.username);
  const totalDonsAuj = donsAuj.reduce((a, d) => a + d.quantite, 0);
  return `<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-box">
      <button class="modal-close modal-close-btn">✕</button>
      <div class="modal-title" style="color:var(--green);">🤲 Don de Pain</div>
      <div style="font-size:13px; color:var(--muted); margin-bottom:18px;">Enregistrez les pains donnés aux mendiants ou personnes dans le besoin. Ce geste est suivi séparément et n'affecte pas vos ventes.</div>
      
      ${totalDonsAuj > 0 ? `
      <div style="background:#F0FDF4; border-radius:10px; padding:12px 14px; margin-bottom:16px; border:1px solid #86EFAC;">
        <div style="font-size:12px; font-weight:700; color:var(--green); margin-bottom:4px;">🤲 Dons d'aujourd'hui</div>
        <div style="font-size:20px; font-weight:800; font-family:'Syne'; color:var(--green);">${totalDonsAuj} pains donnés</div>
        ${donsAuj.map(d => `<div style="font-size:12px; color:var(--muted); margin-top:3px;">• ${d.quantite} pains à ${new Date(d.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} — ${escHTML(d.description||'Don')}</div>`).join('')}
      </div>` : ''}

      <div class="form-group">
        <label class="form-label">Nombre de pains donnés *</label>
        <input id="don-qte" class="form-input" type="number" min="1" max="50" placeholder="Ex: 5"
          style="font-size:22px; text-align:center; font-weight:700;">
      </div>
      <div class="form-group">
        <label class="form-label">Description (optionnel)</label>
        <input id="don-desc" class="form-input" placeholder="Ex: Donnés au coin de la rue Blanchot...">
      </div>
      <div id="modal-error" style="display:none;" class="alert-error"></div>
      <div class="form-actions">
        <button class="btn-secondary modal-close-btn">Annuler</button>
        <button class="btn-primary" id="btn-save-don" style="background:linear-gradient(135deg,var(--green),#047857);">🤲 Enregistrer le don</button>
      </div>
    </div>
  </div>`;
}

function showError(msg){
  const el=document.getElementById('modal-error');
  if(el){ el.style.display='flex'; el.textContent=msg; }
}

// ════════════════════════════════════════════
// 🔌  EVENT BINDING
// ════════════════════════════════════════════
function bindEvents(){
  // Super Admin
  if(state.view === 'superadmin') { bindSuperAdminEvents(); }

  // ── Basculer vue admin → employé ──
  document.querySelectorAll('.btn-switch-view').forEach(btn => {
    btn.addEventListener('click', () => {
      const username = btn.dataset.username;
      const role = btn.dataset.role;
      const targetUser = db.users[username];
      if(!targetUser) return showToast("Utilisateur introuvable.", 'error');
      // Sauvegarder l'état admin actuel
      setState({
        adminPrev: { user: state.user, view: state.view, adminTab: state.adminTab },
        user: { username, ...targetUser },
        view: role,
        modal: null
      });
      showToast(`👁️ Aperçu de l'espace de ${targetUser.nom}`, 'info', 3000);
    });
  });

  // ── Retour Admin depuis vue employé ──
  document.getElementById('btn-retour-admin')?.addEventListener('click', () => {
    if(!state.adminPrev) return;
    setState({
      user: state.adminPrev.user,
      view: state.adminPrev.view,
      adminTab: state.adminPrev.adminTab,
      adminPrev: null,
      modal: null
    });
    showToast('✅ Retour au panneau administrateur', 'success', 2500);
  });

  // Login
  const btnLogin=document.getElementById('btn-login');
  if(btnLogin){ btnLogin.addEventListener('click', doLogin);
    document.getElementById('inp-pass')?.addEventListener('keydown',e=>e.key==='Enter'&&doLogin()); }

  // Password toggle
  document.getElementById('btn-toggle-pass')?.addEventListener('click', () => {
    const inp = document.getElementById('inp-pass');
    const btn = document.getElementById('btn-toggle-pass');
    if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  });

  // Logout
  const btnLogout=document.getElementById('btn-logout');
  if(btnLogout) btnLogout.addEventListener('click',()=>setState({view:'login',user:null,modal:null,loginError:'',fUsername:'',fPassword:''}));

  // Assistant IA Lecture Audio
  document.getElementById('btn-play-ia')?.addEventListener('click', () => {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel(); 
      const text = document.getElementById('ia-summary-text').innerText;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      utterance.rate = 1.0; 
      window.speechSynthesis.speak(utterance);
    } else {
      showToast("Votre navigateur ne supporte pas la lecture audio.", "warning");
    }
  });

  // Admin tabs (sidebar + mobile)
  document.querySelectorAll('.nav-btn[data-tab], .mobile-nav-btn[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      // Close more drawer if open
      const drawer = document.getElementById('mobile-more-drawer');
      if(drawer) drawer.style.display = 'none';
      setState({adminTab:btn.dataset.tab});
    });
  });

  // Mobile "Plus" drawer toggle
  document.getElementById('mobile-plus-btn')?.addEventListener('click', () => {
    const drawer = document.getElementById('mobile-more-drawer');
    if(drawer) drawer.style.display = drawer.style.display === 'none' ? 'block' : 'none';
  });
  // Close drawer on outside click
  document.addEventListener('click', (e) => {
    const drawer = document.getElementById('mobile-more-drawer');
    const plusBtn = document.getElementById('mobile-plus-btn');
    if(drawer && plusBtn && !drawer.contains(e.target) && !plusBtn.contains(e.target)) {
      drawer.style.display = 'none';
    }
  }, {once:false, capture: false});

  // Periode selector
  const sel=document.getElementById('sel-periode');
  if(sel) sel.addEventListener('change',()=>setState({periode:sel.value}));

  // Export CSV
  document.getElementById('btn-export-csv')?.addEventListener('click', exportCSV);
  
  // Print rapport
  document.getElementById('btn-print-rapport')?.addEventListener('click', () => window.print());

  // 🆕 V14 — Export PDF rapport
  document.getElementById('btn-export-pdf-rapport')?.addEventListener('click', exportPDFRapport);

  // Open modals Admin
  document.getElementById('btn-new-chargeur')?.addEventListener('click',()=>setState({modal:'addChargeur',fNom:'',fUsername:'',fPassword:''}));
  document.getElementById('btn-new-livreur')?.addEventListener('click',()=>setState({modal:'addLivreur',fNom:'',fUsername:'',fPassword:''}));
  document.getElementById('btn-add-client')?.addEventListener('click',()=>setState({modal:'addClient',fClientNom:'',fClientAdresse:'',fClientTel:''}));
  document.getElementById('btn-new-depense')?.addEventListener('click',()=>setState({modal:'addDepense'}));
  
  // Modals Inventaire
  document.getElementById('btn-add-farine')?.addEventListener('click',()=>setState({modal:'addFarine'}));
  document.getElementById('btn-edit-config-inv')?.addEventListener('click',()=>setState({modal:'editConfigInv'}));

  // Modals Livreur
  document.getElementById('btn-prise-stock-global')?.addEventListener('click',()=>setState({modal:'priseStockGlobal'}));
  document.getElementById('btn-vente-detail')?.addEventListener('click',()=>setState({modal:'venteDetail'}));

  // Modals Chargeur
  document.getElementById('btn-nouvelle-charge')?.addEventListener('click',()=>setState({modal:'nouvelleCharge'}));
  document.getElementById('btn-declarer-production')?.addEventListener('click',()=>setState({modal:'declarerProduction'}));
  // Approvisionner boutique (Chargeur)
  const btnChargerBoutique = document.getElementById('btn-charger-boutique');
  if(btnChargerBoutique && !btnChargerBoutique.disabled) {
    btnChargerBoutique.addEventListener('click',()=>setState({modal:'chargerBoutique', activeBoutiqueId: Object.keys(db.boutiques||{})[0] || null}));
  }
  document.getElementById('btn-voir-historique-boutiques')?.addEventListener('click',()=>setState({adminTab:'boutiques'}));

  // Don de pain (Livreur)
  document.getElementById('btn-don-pain')?.addEventListener('click',()=>setState({modal:'donPain'}));

  // ── Chargeur : Clients & Ventes Directes ──
  document.getElementById('btn-add-client-chargeur')?.addEventListener('click', () => setState({modal:'addClientChargeur', fClientNom:'', fClientAdresse:'', fClientTel:''}));
  document.getElementById('btn-mes-clients-chargeur')?.addEventListener('click', () => { const el=document.querySelector('.card[style*="FDE68A"]'); if(el) el.scrollIntoView({behavior:'smooth'}); });
  document.getElementById('btn-vente-directe-chargeur')?.addEventListener('click', () => setState({modal:'venteDirecteChargeur', activeClient:null}));
  document.querySelectorAll('.btn-vendre-client-ch').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.cid;
      setState({modal:'venteDirecteChargeur', activeClient:{id:cid, ...db.clients[cid]}});
    });
  });
  document.getElementById('btn-save-client-chargeur')?.addEventListener('click', () => {
    const nom = (document.getElementById('m-cc-nom')?.value||'').trim();
    const adresse = (document.getElementById('m-cc-adresse')?.value||'').trim();
    const telephone = (document.getElementById('m-cc-tel')?.value||'').trim();
    if(!nom){ showError('Veuillez entrer le nom du client'); return; }
    const cid = 'c'+uid();
    db.clients[cid] = { nom, adresse, telephone, creance:0, createdAt:new Date().toISOString() };
    const uname = state.user.username;
    if(!db.chargeursClients[uname]) db.chargeursClients[uname] = [];
    db.chargeursClients[uname].push(cid);
    saveDB();
    setState({modal:null});
    showToast('Client ajouté avec succès !', 'success');
  });
  document.getElementById('btn-save-vente-ch')?.addEventListener('click', () => {
    const qte = parseInt(document.getElementById('m-vch-qte')?.value)||0;
    const prix = parseInt(document.getElementById('m-vch-prix')?.value)||PAIN_PRIX;
    const payeInput = document.getElementById('m-vch-paye')?.value;
    const clientId = document.getElementById('m-vch-client')?.value || '';
    const clientNom = clientId && db.clients[clientId] ? db.clients[clientId].nom : 'Passage';
    if(!qte || qte <= 0){ showError('Veuillez entrer une quantité valide'); return; }
    if(!prix || prix <= 0){ showError('Prix invalide'); return; }
    const montant = qte * prix;
    const paye = payeInput !== '' ? (parseInt(payeInput)||0) : montant;
    const creance = Math.max(0, montant - paye);
    if(clientId && creance > 0 && db.clients[clientId]) db.clients[clientId].creance = (db.clients[clientId].creance||0) + creance;
    db.ventesChargeur.push({
      id:'vch'+uid(), chargeur:state.user.username, chargeurNom:state.user.nom,
      clientId: clientId||'passage', clientNom, quantite:qte, prixUnit:prix,
      montant, paye, creance, date:new Date().toISOString()
    });
    saveDB();
    setState({modal:null});
    showToast('Vente enregistrée : '+qte+' pains pour '+fcfa(montant)+(creance>0?' (Créance: '+fcfa(creance)+')':''), creance>0?'info':'success');
  });

  // Open Fiche Client
  document.querySelectorAll('.action-client-card').forEach(card => {
    card.addEventListener('click', (e) => {
      const clientId = e.currentTarget.dataset.id;
      const client = db.clients[clientId];
      const livToday = db.livraisons.find(l => l.clientId === clientId && l.livreur === state.user.username && (isToday(l.date) || l.statut === 'en_cours'));
      
      setState({
        modal: 'ficheClient',
        activeClient: {id: clientId, ...client},
        activeLiv: livToday || null
      });
      updateFichePreview();
    });
  });

  // Close modals
  document.querySelectorAll('.modal-close-btn').forEach(btn => {
      btn.addEventListener('click', () => setState({modal:null}));
  });
  document.getElementById('modal-backdrop')?.addEventListener('click',e=>{
    if(e.target.id==='modal-backdrop') setState({modal:null});
  });

  // Live update inputs for Fiche Client
  ['m-restant-entier','m-restant-demi','m-paye'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', updateFichePreview);
  });
  // Live update pour les dépôts multi-charges
  document.querySelectorAll('.depot-input').forEach(inp => {
    inp.addEventListener('input', updateFichePreview);
