  function updateFichePreview() {
    const preview = document.getElementById('fiche-preview');
    const groupPaiement = document.getElementById('group-paiement');
    if(!preview) return;

    // Lire tous les dépôts par charge
    const depotInputs = document.querySelectorAll('.depot-input');
    let totalDepose = 0;
    depotInputs.forEach(inp => { totalDepose += parseInt(inp.value)||0; });

    // Mettre à jour l'affichage du total
    const totalDisplay = document.getElementById('total-depose-display');
    const totalWrap = document.getElementById('total-depose-display-wrap');
    if(totalDisplay) { totalDisplay.textContent = totalDepose + ' pains'; }
    if(totalWrap && totalDepose > 0) totalWrap.style.display = 'block';

    const rEntierInput = document.getElementById('m-restant-entier')?.value;
    const rDemiInput = document.getElementById('m-restant-demi')?.value;
    const rVal = (parseInt(rEntierInput)||0) + ((parseInt(rDemiInput)||0) * 0.5);
    const isRestantFilled = (rEntierInput !== '' || rDemiInput !== '');

    const payeInput = document.getElementById('m-paye')?.value;
    const payeVal = parseInt(payeInput)||0;
    
    if(totalDepose > 0 || isRestantFilled) {
       let html = `📦 Total déposé : <strong>${totalDepose} pains</strong><br/>`;
       if(isRestantFilled) {
          const v = totalDepose - rVal;
          if(v >= 0) {
             const montantJour = v * PAIN_PRIX;
             const detteAncienne = state.activeClient.creance || 0;
             const totalDu = montantJour + detteAncienne;
             const reste = totalDu - payeVal;

             html += `✅ Vendus : <strong style="color:var(--green);">${v} pains</strong> (Valeur: ${fcfa(montantJour)})<br/>`;
             if(detteAncienne !== 0) {
                 html += `Ancienne dette / solde : <strong style="color:${detteAncienne>0?'var(--red)':'var(--green)'};">${fcfa(detteAncienne)}</strong><br/>`;
             }
             html += `<div style="margin:8px 0; padding:8px; background:#fff; border-radius:6px; border:1px solid #D1D5DB;">Total à régler : <strong>${fcfa(totalDu)}</strong><br/>`;
             html += `<button type="button" onclick="document.getElementById('m-paye').value=${totalDu}; document.getElementById('m-paye').dispatchEvent(new Event('input'))" style="margin-top:6px; font-family:'DM Sans'; font-size:12px; font-weight:bold; padding:6px 10px; border-radius:6px; border:1px solid var(--green); background:#F0FDF4; color:var(--green); cursor:pointer; width:100%;">💰 Payer la totalité (${fcfa(totalDu)})</button></div>`;

             if(payeInput !== '') {
                 if(reste > 0) {
                     html += `Nouveau solde (Dette) : <strong style="color:var(--red);">${fcfa(reste)}</strong>`;
                 } else if (reste < 0) {
                     html += `Nouveau solde (Avoir) : <strong style="color:var(--green);">${fcfa(Math.abs(reste))}</strong>`;
                 } else {
                     html += `Nouveau solde : <strong style="color:var(--green);">Réglé (0 FCFA)</strong>`;
                 }
             }

             if(groupPaiement) groupPaiement.style.display = 'block';
          } else {
             html += `<strong style="color:var(--red);">Erreur: Plus de retours que de pains déposés.</strong>`;
             if(groupPaiement) groupPaiement.style.display = 'none';
          }
       } else {
           if(groupPaiement) groupPaiement.style.display = 'none';
       }
       preview.innerHTML = html;
       preview.style.display = 'block';
    } else {
       preview.style.display = 'none';
       if(groupPaiement) groupPaiement.style.display = 'none';
    }
  }

  function saveFicheClient(statut) {
    // Lire tous les dépôts par charge
    const depotInputs = document.querySelectorAll('.depot-input');
    const depots = [];
    let totalDepose = 0;
    depotInputs.forEach(inp => {
      const qte = parseInt(inp.value)||0;
      const chargeId = inp.dataset.chargeId;
      const numCharge = parseInt(inp.dataset.num)||1;
      if(qte >= 0) {
        depots.push({ chargeId, numCharge, qte });
        totalDepose += qte;
      }
    });

    // Compatibilité ancienne structure matin/soir
    const matin = depots.filter(d => d.numCharge === 1).reduce((a,d)=>a+d.qte, 0);
    const soir = depots.filter(d => d.numCharge >= 2).reduce((a,d)=>a+d.qte, 0);
    
    const rEntierInput = document.getElementById('m-restant-entier')?.value;
    const rDemiInput = document.getElementById('m-restant-demi')?.value;
    const restant = (parseInt(rEntierInput)||0) + ((parseInt(rDemiInput)||0) * 0.5);

    const payeInput = document.getElementById('m-paye')?.value;
    const paye = payeInput !== '' ? parseInt(payeInput) : 0; 
    
    if(statut === 'terminee') {
       if(totalDepose === 0) { showError("Impossible de clôturer avec 0 pain déposé."); return; }
       if(rEntierInput === "" && rDemiInput === "") { showError("Veuillez saisir les retours (Mettez 0 s'il n'y en a pas)."); return; }
       if(restant > totalDepose) { showError("Les retours ne peuvent pas dépasser les dépôts."); return; }
    }

    const vendu = totalDepose - restant;
    const montant = vendu * PAIN_PRIX;

    if(statut === 'terminee') {
      const client = db.clients[state.activeClient.id];
      if(!client.creance) client.creance = 0;

      if (state.activeLiv && state.activeLiv.statut === 'terminee') {
          const old_montant = state.activeLiv.montant || 0;
          const old_paye = state.activeLiv.paye !== undefined ? state.activeLiv.paye : old_montant;
          client.creance -= old_montant;
          client.creance += old_paye;
      }
      
      client.creance += montant; 
      client.creance -= paye;    
    }

    if(state.activeLiv) {
      const l = db.livraisons.find(x => x.id === state.activeLiv.id);
      if(l) {
        l.depots = depots; l.matin = matin; l.soir = soir;
        l.restant = restant; l.vendu = vendu; l.montant = montant; l.paye = paye;
        l.statut = statut;
        l.date = new Date().toISOString();
      }
    } else {
      db.livraisons.push({
        id: 'liv'+uid(),
        clientId: state.activeClient.id,
        client: state.activeClient.nom,
        livreur: state.user.username,
        depots, matin, soir, restant, vendu, montant, paye,
        statut,
        date: new Date().toISOString()
      });
    }
    
    saveDB(); 
    setState({modal:null});

    if(statut === 'terminee') {
      const nbCharges = depots.filter(d=>d.qte>0).length;
      showToast(`✅ Journée clôturée pour ${state.activeClient.nom} ! ${nbCharges} charge(s) · ${vendu} pains vendus · ${fcfa(paye)} encaissés.`, 'success', 5000);
    }
  }

    showToast('💣 Réinitialisation complète effectuée.', 'error', 6000);
    setState({ adminTab: 'overview' });
  });

  // ── Boutique / Vendeur Events ──
  bindBoutiqueEvents();

  // ── Delete Client ──
  document.querySelectorAll('.btn-del-client').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const livreur = btn.dataset.livreur;
      const nom = btn.dataset.nom;
      if(!confirm(`Supprimer le client "${nom}" ? Cette action est irréversible.`)) return;
      delete db.clients[id];
      // Remove from livreur's client list
      if(db.livreurs[livreur]) {
        db.livreurs[livreur].clients = (db.livreurs[livreur].clients||[]).filter(cid => cid !== id);
      }
      saveDB();
      setState({adminTab:'clients'});
      showToast(`🗑 Client "${nom}" supprimé.`, 'info');
    });
  });

  // ── Delete Livreur ──
  document.querySelectorAll('.btn-del-livreur').forEach(btn => {
    btn.addEventListener('click', () => {
      const username = btn.dataset.username;
      const nom = btn.dataset.nom;
      if(!confirm(`Supprimer le livreur "${nom}" (@${username}) ? Ses données de tournée seront conservées mais le compte sera supprimé.`)) return;
      delete db.users[username];
      delete db.livreurs[username];
      saveDB();
      setState({adminTab:'livreurs'});
      showToast(`🗑 Livreur "${nom}" supprimé.`, 'info');
    });
  });

  // ── Delete Dépense ──
  document.querySelectorAll('.btn-del-depense').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if(!confirm('Supprimer cette dépense ?')) return;
      db.depenses = (db.depenses||[]).filter(d => d.id !== id);
      saveDB();
      setState({adminTab:'depenses'});
      showToast('🗑 Dépense supprimée.', 'info');
    });
  });
}

          <div>

        </div>
        <div class="livreur-stats">
          <div class="mini-stat">
            <div class="mini-stat-label">Vendeurs</div>

            prodBToday.slice(0,4).map(p => `

  <div class="card" style="padding:0;overflow:hidden;">

    <table class="data-table">
      <thead><tr>
        <th>Date</th><th>Boutique</th><th>Vendeur</th><th>Produits vendus</th><th class="right">Encaissé</th><th>Statut</th>
      </tr></thead>
      <tbody>
        ${!(db.ventesJournalieresVendeur||[]).length ? `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted);">Aucune journée enregistrée</td></tr>` :

function buildVendeur() {
  const u = state.user;
  const boutiqueId = u.boutiqueId;
  const boutique = boutiqueId ? db.boutiques[boutiqueId] : null;

  if (!boutique) {
    return `
    <div class="main fade-in" style="max-width:600px;margin:0 auto;padding:40px 20px;text-align:center;">
      <div style="font-size:60px;margin-bottom:20px;">⚠️</div>
      <h2 style="font-family:'Syne';font-weight:800;margin-bottom:10px;">Aucune boutique assignée</h2>
      <p style="color:var(--muted);margin-bottom:20px;">Votre compte n'est pas encore lié à une boutique. Contactez l'administrateur.</p>
      <button class="btn-logout" id="btn-logout" style="width:auto;padding:12px 30px;">Déconnexion</button>
      ${buildModal()}
    </div>`;
  }

  const produits = boutique.produits || [];
  const today = new Date(); today.setHours(0,0,0,0);

  // Journée en cours ou clôturée du jour
  const journeeAuj = (db.ventesJournalieresVendeur||[]).find(v =>
    v.boutiqueId === boutiqueId && v.vendeur === u.username &&
    (v.statut === 'en_cours' || (v.statut === 'cloturee' && (() => { const d=new Date(v.date); d.setHours(0,0,0,0); return d.getTime()===today.getTime(); })()))
  );
  const isCloturee = journeeAuj && journeeAuj.statut === 'cloturee';

  // Calculer stats en cours
  let totalVenduVal = 0, totalRestantVal = 0, totalEncaisseVal = 0;
  if (journeeAuj && journeeAuj.lignes) {
    journeeAuj.lignes.forEach(l => {
      totalVenduVal += (l.vendu || 0) * l.prix;
      totalRestantVal += (l.restant || 0) * l.prix;
      totalEncaisseVal += (l.encaisse || 0);
    });
  }

  // Historique dernières journées
  const historique = (db.ventesJournalieresVendeur||[])
    .filter(v => v.boutiqueId === boutiqueId && v.vendeur === u.username && v.statut === 'cloturee')
    .sort((a,b) => new Date(b.date)-new Date(a.date))
    .slice(0,7);

  return `
  <div class="main fade-in" style="max-width:960px;margin:0 auto;padding-bottom:20px;">
    ${state.adminPrev ? `
    <div style="background:linear-gradient(135deg,#7C3AED,#A78BFA);border-radius:14px;padding:14px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 16px rgba(124,58,237,.3);">
      <div style="color:white;display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;">👁️</span>
        <div>
          <div style="font-weight:800;font-size:14px;">Mode Aperçu Admin</div>
          <div style="font-size:12px;opacity:.85;">Vous voyez l'espace de <strong>${escHTML(u.nom)}</strong></div>
        </div>
      </div>
      <button id="btn-retour-admin" style="padding:10px 20px;background:white;color:#7C3AED;border:none;border-radius:10px;font-family:'Syne';font-size:14px;font-weight:800;cursor:pointer;">← Retour Admin</button>
    </div>` : ''}
    <div style="background:linear-gradient(135deg,#7C3AED,#A78BFA);padding:28px 32px;border-radius:16px;color:#fff;margin-bottom:28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.18);">
      <div>
        <div style="font-size:13px;opacity:.85;margin-bottom:5px;">Espace Vendeur — ${escHTML(boutique.nom)}</div>
        <h1 style="font-family:'Syne';font-size:26px;font-weight:800;letter-spacing:-1px;">🛍️ ${escHTML(u.nom)}</h1>
        <div id="live-clock" style="font-size:12px;opacity:.75;margin-top:4px;"></div>
      </div>
      <button class="btn-logout" id="btn-logout" style="width:auto;padding:10px 20px;">Déconnexion</button>
    </div>

    <div class="kpi-grid" style="margin-bottom:24px;">
      ${kpi('🧁','Produits au catalogue',produits.length.toString(),'#7C3AED')}
      ${kpi('💰','CA Journée',fcfa(totalEncaisseVal),'var(--green)')}
      ${kpi('🛒','Valeur vendue',fcfa(totalVenduVal),'var(--amber)')}
      ${kpi('↩️','Valeur restante',fcfa(totalRestantVal),'var(--muted)')}
    </div>

    ${isCloturee ? `
    <div class="alert-success" style="padding:16px;margin-bottom:24px;font-size:15px;">
      ✅ <strong>Journée clôturée !</strong> Vous avez encaissé <strong>${fcfa(journeeAuj.totalEncaisse||0)}</strong> — 
      Vendu: ${journeeAuj.totalVendu||0} articles • Restant: ${journeeAuj.totalRestant||0} articles
    </div>` : ''}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:28px;">
      ${!isCloturee ? `<button id="btn-ouvrir-journee" style="background:var(--white);border:2px solid #DDD6FE;border-radius:14px;padding:22px;cursor:pointer;text-align:start;width:100%;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 14px rgba(0,0,0,.05);font-family:'DM Sans';" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 10px 24px rgba(124,58,237,.15)';this.style.borderColor='#7C3AED';" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 14px rgba(0,0,0,.05)';this.style.borderColor='#DDD6FE';">
        <div style="font-size:38px;margin-bottom:12px;">${journeeAuj ? '📝' : '🌅'}</div>
        <div style="font-family:'Syne';font-size:17px;font-weight:700;margin-bottom:5px;">${journeeAuj ? 'Saisir les ventes du jour' : 'Ouvrir la journée'}</div>
        <div style="font-size:13px;color:var(--muted);">${journeeAuj ? 'Renseigner quantités sorties et restantes' : 'Démarrer en saisissant les stocks du matin'}</div>

      <button id="btn-voir-journee" style="background:#F0FDF4;border:2px solid #86EFAC;border-radius:14px;padding:22px;cursor:pointer;text-align:start;width:100%;font-family:'DM Sans';">
        <div style="font-size:38px;margin-bottom:12px;">📋</div>
        <div style="font-family:'Syne';font-size:17px;font-weight:700;margin-bottom:5px;color:var(--green);">Voir le bilan</div>

        <div style="font-size:38px;margin-bottom:12px;">🧁</div>
        <div style="font-family:'Syne';font-size:17px;font-weight:700;margin-bottom:5px;">Gérer mes produits</div>
        <div style="font-size:13px;color:var(--muted);">Ajouter, modifier les produits et prix</div>
      </button>
    </div>

    ${historique.length > 0 ? `
    <div class="card">
      <div class="card-title">📅 Mes dernières journées</div>
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Articles vendus</th><th class="right">CA Vente</th><th class="right">Encaissé</th><th class="right">Restant valeur</th>
        </tr></thead>
        <tbody>
          ${historique.map(v => `<tr>
            <td style="font-size:13px;color:var(--muted);">${fdate(v.date)}</td>
            <td><strong>${v.totalVendu||0}</strong></td>
            <td class="right" style="color:var(--amber);">${fcfa(v.totalCA||0)}</td>
            <td class="right"><strong style="color:var(--green);">${fcfa(v.totalEncaisse||0)}</strong></td>
            <td class="right" style="color:var(--muted);">${fcfa(v.totalRestantValeur||0)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  </div>
  ${buildModal()}`;
}

  const u = state.user;
  const boutiqueId = u ? u.boutiqueId : null;

  // ── Admin : Créer une boutique ──

    return `

    <div id="modal-error" style="display:none;" class="alert-error"></div>
    <div class="form-actions">
      <button class="btn-secondary modal-close-btn">Annuler</button>

    return `

    <div class="form-actions">
      <button class="btn-secondary modal-close-btn">Annuler</button>
      <button class="btn-primary" id="btn-save-vendeur" style="background:linear-gradient(135deg,#059669,#34D399);">✅ Créer le vendeur</button>

      <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">🧁 CATALOGUE PRODUITS</div>
      <div id="produits-list" style="max-height:300px;overflow-y:auto;margin-bottom:14px;">

    <div id="modal-error" style="display:none;" class="alert-error"></div>
    ${!isCl ? `

function updateJourneeRecap() {
  const matins = document.querySelectorAll('.jrn-matin');
  const restants = document.querySelectorAll('.jrn-restant');
  let totalCA = 0, totalVendu = 0, totalRestant = 0;
  let hasData = false;

  matins.forEach((inp, i) => {
    const prix = parseFloat(inp.dataset.prix) || 0;
    const qMatin = parseInt(inp.value) || 0;
    const qRest = parseInt(restants[i]?.value) || 0;
    const vendu = Math.max(0, qMatin - qRest);
    const vendEl = document.querySelector(`.jrn-vendu[data-idx="${i}"]`);
    if (vendEl) vendEl.textContent = vendu;
    totalCA += vendu * prix;
    totalVendu += vendu;
    totalRestant += qRest;
    if (qMatin > 0) hasData = true;
  });

  const recap = document.getElementById('journee-recap');
  if (recap) {
    recap.style.display = hasData ? 'block' : 'none';
    const recapCA = document.getElementById('recap-ca');
    const recapVendu = document.getElementById('recap-vendu');
    const recapRestant = document.getElementById('recap-restant');
    if (recapCA) recapCA.textContent = fcfa(totalCA);
    if (recapVendu) recapVendu.textContent = totalVendu;
    if (recapRestant) recapRestant.textContent = totalRestant;
  }
}

function sauverJournee(statut) {
  const u = state.user;
  const boutiqueId = u.boutiqueId;
  const boutique = db.boutiques[boutiqueId];
  if (!boutique) return;
  const produits = boutique.produits || [];

  const matins = document.querySelectorAll('.jrn-matin');
  const restants = document.querySelectorAll('.jrn-restant');
  const lignes = [];
  let totalCA = 0, totalVendu = 0, totalRestant = 0, totalRestantValeur = 0;

  matins.forEach((inp, i) => {
    const prix = parseFloat(inp.dataset.prix) || 0;
    const produitId = inp.dataset.id;
    const produitNom = inp.dataset.nom;
    const qMatin = parseInt(inp.value) || 0;
    const qRest = parseInt(restants[i]?.value) || 0;
    const vendu = Math.max(0, qMatin - qRest);
    const encaisseLigne = vendu * prix;
    totalCA += encaisseLigne;
    totalVendu += vendu;
    totalRestant += qRest;
    totalRestantValeur += qRest * prix;
    if (qMatin > 0) {
      lignes.push({ produitId, produitNom, prix, qMatin, restant: qRest, vendu, ca: encaisseLigne, encaisse: encaisseLigne });
    }
  });

  if (statut === 'cloturee') {
    if (!lignes.length) { showError("Veuillez saisir au moins une quantité."); return; }
    for (const inp of matins) {
      const i = parseInt(inp.dataset.idx);
      const qMatin = parseInt(inp.value)||0;
      const qRest = parseInt(restants[i]?.value)||0;
      if (qMatin > 0 && restants[i].value === '') { showError("Veuillez renseigner les restants pour tous les produits ayant une quantité."); return; }
      if (qRest > qMatin) { showError(`Le restant ne peut pas dépasser la quantité mise en vente pour "${inp.dataset.nom}".`); return; }
    }
  }

  const encaisseInput = document.getElementById('jrn-encaisse');
  const totalEncaisse = encaisseInput ? (parseInt(encaisseInput.value)||0) : totalCA;

  const today = new Date(); today.setHours(0,0,0,0);
  const existIdx = (db.ventesJournalieresVendeur||[]).findIndex(v => {
    if(v.boutiqueId !== boutiqueId || v.vendeur !== u.username) return false;
    if(v.statut === 'en_cours') return true;
    // For closed entries, only match if it was closed today
    const d = new Date(v.date); d.setHours(0,0,0,0);
    return v.statut === 'cloturee' && d.getTime() === today.getTime();
  });

  const record = {
    id: existIdx >= 0 ? db.ventesJournalieresVendeur[existIdx].id : 'vjv'+uid(),
    boutiqueId, vendeur: u.username, vendeurNom: u.nom,
    date: new Date().toISOString(),
    lignes, totalCA, totalVendu, totalRestant, totalRestantValeur,
    totalEncaisse, statut
  };

  if (!db.ventesJournalieresVendeur) db.ventesJournalieresVendeur = [];
  if (!db.chargeursClients) db.chargeursClients = {};
  if (!db.ventesChargeur) db.ventesChargeur = [];
  if (existIdx >= 0) db.ventesJournalieresVendeur[existIdx] = record;
  else db.ventesJournalieresVendeur.push(record);

  saveDB();
  setState({ modal: null });

  if (statut === 'cloturee') {
    showToast(`✅ Journée clôturée ! Vendu : ${totalVendu} articles · Encaissé : ${fcfa(totalEncaisse)}`, 'success', 5000);
  } else {
    showToast('💾 Brouillon sauvegardé !', 'info');
  }
}

// 🔌  BIND EVENTS BOUTIQUE / VENDEUR
// ════════════════════════════════════════════
function bindBoutiqueEvents() {
  // ── Admin : Ouvrir modaux ──
  document.getElementById('btn-new-boutique')?.addEventListener('click', () => setState({ modal: 'addBoutique' }));
  document.getElementById('btn-new-vendeur')?.addEventListener('click', () => setState({ modal: 'addVendeur' }));

  // ── Admin : Gérer boutique ──
  document.querySelectorAll('.btn-gerer-boutique').forEach(btn => {
    btn.addEventListener('click', () => setState({ modal: 'gererBoutique', activeBoutiqueId: btn.dataset.id }));
  });
  document.querySelectorAll('.btn-voir-rapportB').forEach(btn => {
    btn.addEventListener('click', () => setState({ modal: 'rapportBoutique', activeBoutiqueId: btn.dataset.id }));
  });

  // 🆕 V14 — Notifications bell
  document.getElementById('btn-notif-bell')?.addEventListener('click', openNotifPanel);

  // 🆕 V14 — Calculatrice
  document.getElementById('btn-calc-open')?.addEventListener('click', openCalc);

  // Refresh notification badge
  setTimeout(() => {
    buildNotifications();
  }, 200);

  // ── Sauvegarder boutique ──
  document.getElementById('btn-save-boutique')?.addEventListener('click', () => {
    const nom = document.getElementById('mb-nom').value.trim();
    const adresse = document.getElementById('mb-adresse').value.trim();
    const desc = document.getElementById('mb-desc').value.trim();
    if (!nom) { showError("Le nom de la boutique est obligatoire."); return; }
    const id = 'boutique_' + uid();
    if (!db.boutiques) db.boutiques = {};
    db.boutiques[id] = { nom, adresse, desc, produits: [], createdAt: new Date().toISOString() };
    saveDB();
    setState({ modal: null, adminTab: 'boutiques' });
    showToast(`🏪 Boutique "${nom}" créée avec succès !`, 'success');
  });

  // ── Sauvegarder vendeur ──
  document.getElementById('btn-save-vendeur')?.addEventListener('click', () => {
    const nom = document.getElementById('mv-nom').value.trim();
    const username = document.getElementById('mv-username').value.trim().toLowerCase();
    const password = document.getElementById('mv-password').value;
    const boutiqueId = document.getElementById('mv-boutique').value;
    if (!nom) { showError("Le nom est obligatoire."); return; }
    if (!username) { showError("Le nom d'utilisateur est obligatoire."); return; }
    if (!password) { showError("Le mot de passe est obligatoire."); return; }
    if (!boutiqueId) { showError("Veuillez choisir une boutique."); return; }
    if (db.users[username]) { showError("Ce nom d'utilisateur existe déjà."); return; }
    db.users[username] = { role: 'vendeur', nom, password, boutiqueId, createdAt: new Date().toISOString() };
    saveDB();
    setState({ modal: null, adminTab: 'boutiques' });
    showToast(`👤 Vendeur "${nom}" créé avec succès !`, 'success');
  });

  // ── Ajouter produit à la boutique ──
  document.getElementById('btn-add-produit-boutique')?.addEventListener('click', () => {
    const nom = document.getElementById('np-nom').value.trim();
    const prix = parseInt(document.getElementById('np-prix').value) || 0;
    const cat = document.getElementById('np-cat').value;
    if (!nom) { showError("Le nom du produit est obligatoire."); return; }
    if (!prix || prix <= 0) { showError("Le prix doit être supérieur à 0."); return; }
    const bid = state.activeBoutiqueId;
    if (!db.boutiques[bid].produits) db.boutiques[bid].produits = [];
    db.boutiques[bid].produits.push({ id: uid(), nom, prix, categorie: cat, createdAt: new Date().toISOString() });
    saveDB();
    setState({ modal: 'gererBoutique', activeBoutiqueId: bid });
    showToast(`🧁 Produit "${nom}" ajouté !`, 'success');
  });

  // ── Supprimer produit ──
  document.querySelectorAll('.btn-del-produit').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const bid = state.activeBoutiqueId;
      db.boutiques[bid].produits.splice(idx, 1);
      saveDB();
      setState({ modal: 'gererBoutique', activeBoutiqueId: bid });
    });
  });

  // ── Vendeur : ouvrir journée ──
  document.getElementById('btn-ouvrir-journee')?.addEventListener('click', () => setState({ modal: 'saisirJournee' }));
  document.getElementById('btn-voir-journee')?.addEventListener('click', () => setState({ modal: 'saisirJournee' }));
  document.getElementById('btn-gerer-produits')?.addEventListener('click', () => setState({ modal: 'gererProduitsVendeur' }));

  // ── Calc live journée ──
  document.querySelectorAll('.jrn-matin, .jrn-restant').forEach(inp => {
    inp.addEventListener('input', updateJourneeRecap);
  });
  // Déclencher une fois au chargement si valeurs existantes
  updateJourneeRecap();

  // ── Sauver brouillon journée ──
  document.getElementById('btn-sauver-brouillon-jrn')?.addEventListener('click', () => sauverJournee('en_cours'));
  // ── Clôturer journée ──
  document.getElementById('btn-cloturer-journee')?.addEventListener('click', () => sauverJournee('cloturee'));
}

function exportCSV() {
  const r = calcRapport(state.periode);
  const periodeLabel = {"aujourd'hui":"Aujourd_hui", semaine:"Cette_semaine", mois:"Ce_mois", tout:"Historique"};
  
  // Export livraisons
  const rows = [['Date','Client','Livreur','Statut','Déposés','Vendus','Retours','Montant FCFA','Encaissé FCFA']];

  if(state.periode==="aujourd'hui") start=today;
  else if(state.periode==='semaine') start=new Date(today-7*86400000);
  else if(state.periode==='mois') start=new Date(today.getFullYear(),today.getMonth(),1);
  else start=new Date(0);

  db.livraisons
    .filter(l=>new Date(l.date)>=start && l.statut!=='en_cours')
    .sort((a,b)=>new Date(b.date)-new Date(a.date))
    .forEach(l=>{
      rows.push([
        new Date(l.date).toLocaleDateString('fr-FR'),
        l.client, l.livreur, l.statut==='terminee'?'Clôturé':'En cours',
        l.matin+l.soir, l.vendu, l.restant,
        l.montant, l.paye||l.montant
      ]);
    });
  
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Rapport_${db.settings.nom.replace(/\s/g,'_')}_${periodeLabel[state.periode]||'Export'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export CSV téléchargé avec succès !', 'success');
}

// ── Historique connexions ──
function buildSAHistory() {
  const logs = (db.loginHistory||[]);
  const today = new Date(); today.setHours(0,0,0,0);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

  // Stats par utilisateur ce mois
  const statsByUser = {};
  logs.forEach(l => {
    if(!statsByUser[l.username]) statsByUser[l.username] = { nom: l.userNom, role: l.userRole, today: 0, month: 0, total: 0 };
    statsByUser[l.username].total++;
    const ld = new Date(l.loginAt);
    if(ld >= monthStart) statsByUser[l.username].month++;
    if(ld >= today) statsByUser[l.username].today++;
  });

  // Chart 7 derniers jours
  const week = [];
  for(let i=6;i>=0;i--) {
    const d = new Date(today.getTime() - i*86400000);
    const next = new Date(d.getTime() + 86400000);
    const count = logs.filter(l => { const ld = new Date(l.loginAt); return ld >= d && ld < next; }).length;
    week.push({ jour: d.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit'}), count });
  }
  const maxW = Math.max(...week.map(w=>w.count), 1);

  // Filtre
  const filterUser = state.saHistoryFilter || '';
  const filterRole = state.saHistoryRole || '';
  let filtered = logs;
  if(filterUser) filtered = filtered.filter(l => l.username === filterUser);
  if(filterRole) filtered = filtered.filter(l => l.userRole === filterRole);

  return `
  <h1 class="page-title" style="margin-bottom:28px;">📅 Historique des Connexions</h1>

  <!-- Stats par utilisateur -->
  <div class="card" style="margin-bottom:24px;">
    <div class="card-title">📊 Résumé par Administrateur</div>
    ${Object.keys(statsByUser).length === 0 ? `<div class="empty"><div class="empty-icon">📊</div><p>Aucune connexion enregistrée</p></div>` : `
    <table class="data-table">
      <thead>
        <tr>
          <th>Utilisateur</th>
          <th>Rôle</th>
          <th class="right">Aujourd'hui</th>
          <th class="right">Ce mois</th>
          <th class="right">Total</th>
          <th class="right">Voir détail</th>
        </tr>
      </thead>
      <tbody>
        ${Object.entries(statsByUser).map(([username, s]) => `
        <tr>
          <td><strong>${escHTML(s.nom)}</strong><br><span style="font-size:11px;color:var(--muted);">@${escHTML(username)}</span></td>
          <td><span class="badge" style="${s.role==='admin'?'background:#EDE9FE;color:#6D28D9;':'background:#D1FAE5;color:#065F46;'}">${s.role}</span></td>
          <td class="right"><strong style="color:${s.today>0?'var(--gold)':'var(--muted)'};">${s.today}</strong></td>
          <td class="right"><strong style="color:var(--green);">${s.month}</strong></td>
          <td class="right"><strong>${s.total}</strong></td>
          <td class="right">
            <button class="btn-secondary btn-sa-filter-user" data-username="${escHTML(username)}" style="padding:7px 14px;font-size:13px;">🔍 Filtrer</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`}
  </div>

  <!-- Graphe 7 jours -->
  <div class="card" style="margin-bottom:24px;">
    <div class="card-title">📈 Connexions — 7 derniers jours</div>
    <div style="display:flex;align-items:flex-end;gap:10px;height:140px;padding:0 8px;">
      ${week.map(w => {
        const h = Math.max(6, Math.round((w.count / maxW) * 120));
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="font-size:12px;font-weight:700;color:var(--dark);">${w.count||''}</div>
          <div style="width:100%;height:${h}px;background:linear-gradient(180deg,#7C3AED,#A78BFA);border-radius:8px 8px 0 0;min-height:6px;"></div>
          <div style="font-size:10px;color:var(--muted);text-align:center;">${w.jour}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Liste détaillée -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <span>🕐 Journal détaillé ${filterUser ? `— @${escHTML(filterUser)}` : '(tous)'}</span>
      <div style="display:flex;gap:8px;">
        ${filterUser ? `<button class="btn-secondary" id="btn-sa-clear-filter" style="padding:8px 14px;font-size:13px;">✕ Effacer filtre</button>` : ''}
        <select id="sa-log-role-filter" class="form-select" style="width:auto;padding:8px 12px;font-size:13px;">
          <option value="">Tous les rôles</option>
          <option value="admin" ${state.saHistoryRole==='admin'?'selected':''}>Admin</option>
          <option value="chargeur" ${state.saHistoryRole==='chargeur'?'selected':''}>Chargeur</option>
          <option value="vendeur" ${state.saHistoryRole==='vendeur'?'selected':''}>Vendeur</option>
        </select>
      </div>
    </div>
    ${filtered.length === 0 ? `<div class="empty"><div class="empty-icon">📋</div><p>Aucune connexion enregistrée</p></div>` : `
    <table class="data-table">
      <thead>
        <tr>
          <th>Date & Heure</th>
          <th>Utilisateur</th>
          <th>Rôle</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.slice(0, 150).map(l => {
          const ld = new Date(l.loginAt);
          const isToday2 = ld >= today;
          return `<tr>
            <td>
              <div style="font-weight:600;${isToday2?'color:var(--gold);':''}">
                ${isToday2 ? '🟢 ' : ''}${ld.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}

              <div style="font-size:12px;color:var(--muted);">${ld.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>

            <td><span class="badge" style="${l.userRole==='admin'?'background:#EDE9FE;color:#6D28D9;':'background:#D1FAE5;color:#065F46;'}">${l.userRole}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${filtered.length > 150 ? `<div style="text-align:center;padding:16px;font-size:13px;color:var(--muted);">... et ${filtered.length-150} entrées supplémentaires</div>` : ''}`}
  </div>`;
}

  // Licence : toggle rapide
  document.querySelectorAll('.btn-sa-toggle-lic').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.dataset.username;
      const action = btn.dataset.action;
      if(!db.licenses) db.licenses = {};
      if(!db.licenses[u]) db.licenses[u] = { active: false, expiresAt: null, note: '' };
      db.licenses[u].active = action === 'activate';
      saveDB();
      showToast(action==='activate' ? `✅ Licence de @${u} activée !` : `🚫 Licence de @${u} désactivée.`, action==='activate'?'success':'warning');
      setState({});
    });
  });

  // Filtre historique par user
  document.querySelectorAll('.btn-sa-filter-user').forEach(btn => {
    btn.addEventListener('click', () => setState({ saHistoryFilter: btn.dataset.username, superAdminTab: 'history' }));
  });

  // Effacer filtre
  document.getElementById('btn-sa-clear-filter')?.addEventListener('click', () => setState({ saHistoryFilter: '' }));

  // Filtre par rôle
  document.getElementById('sa-log-role-filter')?.addEventListener('change', e => {
    setState({ saHistoryRole: e.target.value });
  });

  // Changer MDP superadmin
  document.getElementById('btn-sa-save-pass')?.addEventListener('click', () => {
    const cur = document.getElementById('sa-pass-current').value;
    const nw = document.getElementById('sa-pass-new').value;
    const conf = document.getElementById('sa-pass-confirm').value;
    const errDiv = document.getElementById('sa-pass-error');
    const showErr = (msg) => { errDiv.style.display='flex'; errDiv.innerHTML=`⚠️ ${msg}`; };
    errDiv.style.display = 'none';
    if(cur !== db.users.superadmin.password) return showErr('Mot de passe actuel incorrect.');
    if(nw.length < 6) return showErr('Le nouveau mot de passe doit faire au moins 6 caractères.');
    if(nw !== conf) return showErr('Les mots de passe ne correspondent pas.');
    db.users.superadmin.password = nw;
    saveDB();
    showToast('🔒 Mot de passe Super Admin modifié avec succès !', 'success');
    document.getElementById('sa-pass-current').value = '';
    document.getElementById('sa-pass-new').value = '';
    document.getElementById('sa-pass-confirm').value = '';
  });

  // Changer MDP d'un admin
  document.querySelectorAll('.btn-sa-change-pass').forEach(btn => {
    btn.addEventListener('click', () => {
      const username = btn.dataset.username;
      const nom = btn.dataset.nom;
      const newPass = prompt(`Nouveau mot de passe pour ${nom} (@${username}):`);
      if(!newPass) return;
      if(newPass.length < 3) return showToast('Mot de passe trop court (min 3 car.)', 'error');
      db.users[username].password = newPass;
      saveDB();
      showToast(`🔑 Mot de passe de @${username} modifié !`, 'success');
    });
  });

  // Créer admin
  document.getElementById('btn-sa-add-admin')?.addEventListener('click', () => {
    const modalContainer = document.getElementById('sa-extra-modal');
    if(modalContainer) { modalContainer.innerHTML = buildSAAddAdminModal(); bindSAModalEvents(); }
  });
}

function bindSAModalEvents() {
  document.getElementById('sa-modal-close')?.addEventListener('click', () => {
    const mc = document.getElementById('sa-extra-modal');
    if(mc) mc.innerHTML = '';
  });
  document.getElementById('sa-modal-cancel')?.addEventListener('click', () => {
    const mc = document.getElementById('sa-extra-modal');
    if(mc) mc.innerHTML = '';
  });
  document.getElementById('sa-modal-backdrop')?.addEventListener('click', e => {
    if(e.target.id === 'sa-modal-backdrop') { const mc = document.getElementById('sa-extra-modal'); if(mc) mc.innerHTML = ''; }
  });

  // Save licence
  document.getElementById('sa-modal-save')?.addEventListener('click', () => {
    const u = state.saEditUsername;
    if(!u) return;
    if(!db.licenses) db.licenses = {};
    const active = document.getElementById('sa-lic-active').value === '1';
    const expiry = document.getElementById('sa-lic-expiry').value;
    const note = document.getElementById('sa-lic-note').value.trim();
    db.licenses[u] = {
      active,
      expiresAt: expiry ? new Date(expiry).toISOString() : null,
      note,
      updatedAt: new Date().toISOString(),
      createdAt: (db.licenses[u]||{}).createdAt || new Date().toISOString()
    };
    saveDB();
    showToast(`✅ Licence de @${u} mise à jour !`, 'success');
    const mc = document.getElementById('sa-extra-modal');
    if(mc) mc.innerHTML = '';
    setState({});
  });

  // Save nouvel admin
  document.getElementById('sa-add-admin-save')?.addEventListener('click', () => {
    const nom = document.getElementById('sa-new-nom').value.trim();
    const username = document.getElementById('sa-new-username').value.trim().toLowerCase();
    const pass = document.getElementById('sa-new-pass').value;
    const expiry = document.getElementById('sa-new-expiry').value;
    const errDiv = document.getElementById('sa-add-error');
    const showErr = (m) => { errDiv.style.display='flex'; errDiv.innerHTML=`⚠️ ${m}`; };
    errDiv.style.display='none';
    if(!nom) return showErr('Le nom est obligatoire.');
    if(!username) return showErr("Le nom d'utilisateur est obligatoire.");
    if(!pass || pass.length < 3) return showErr('Mot de passe trop court (min 3 car.).');
    if(db.users[username]) return showErr("Ce nom d'utilisateur existe déjà.");
    db.users[username] = { role:'admin', nom, password: pass, createdAt: new Date().toISOString() };
    if(!db.licenses) db.licenses = {};
    db.licenses[username] = {
      active: true,
      expiresAt: expiry ? new Date(expiry).toISOString() : null,
      note: 'Créé par Super Admin',
      createdAt: new Date().toISOString()
    };
    saveDB();
    showToast(`✅ Admin @${username} créé avec succès !`, 'success');
    const mc = document.getElementById('sa-extra-modal');
    if(mc) mc.innerHTML = '';
    setState({});
  });
}

// 🆕 V14 — RECHERCHE GLOBALE (Ctrl+K)
// ════════════════════════════════════════════
function openGlobalSearch() {
  if(document.getElementById('global-search-wrap')) return;
  const wrap = document.createElement('div');
  wrap.id = 'global-search-wrap';
  wrap.innerHTML = `
    <div id="global-search-box">
      <input id="global-search-input" placeholder="🔍 Rechercher un client, livreur, dépense..." autocomplete="off" />
      <div id="global-search-results" style="max-height:400px;overflow-y:auto;"></div>
      <div style="padding:10px 20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);">
        <kbd style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:10px;">ESC</kbd> pour fermer • 
        <kbd style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:10px;">↵</kbd> pour naviguer
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const input = document.getElementById('global-search-input');
  input.focus();

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    const results = document.getElementById('global-search-results');
    if(!q) { results.innerHTML = ''; return; }
    const items = [];

    // Clients
    Object.entries(db.clients||{}).forEach(([id, c]) => {
      if(c.nom.toLowerCase().includes(q) || (c.adresse||'').toLowerCase().includes(q)) {
        items.push({ icon:'👤', type:'Client', typeColor:'#DBEAFE', typeTextColor:'#1D4ED8', label: c.nom, sub: c.adresse||'', action: () => { setState({ adminTab: 'clients', view: state.view==='admin'?'admin':'admin' }); closeGlobalSearch(); } });
      }
    });
    // Livreurs
    Object.entries(db.users||{}).filter(([,u])=>u.role==='livreur').forEach(([username, u]) => {
      if(u.nom.toLowerCase().includes(q) || username.includes(q)) {
        items.push({ icon:'🚚', type:'Livreur', typeColor:'#FEF3C7', typeTextColor:'#92400E', label: u.nom, sub: '@'+username, action: () => { setState({ adminTab: 'livreurs', view: 'admin' }); closeGlobalSearch(); } });
      }
    });
    // Dépenses
    (db.depenses||[]).forEach(d => {
      if((d.categorie||'').toLowerCase().includes(q) || (d.description||'').toLowerCase().includes(q)) {
        items.push({ icon:'💸', type:'Dépense', typeColor:'#FEE2E2', typeTextColor:'#991B1B', label: d.categorie+(d.description?' — '+d.description:''), sub: fcfa(d.montant)+' · '+fdate(d.date), action: () => { setState({ adminTab: 'depenses', view: 'admin' }); closeGlobalSearch(); } });
      }
    });
    // Livraisons
    (db.livraisons||[]).filter(l=>l.client.toLowerCase().includes(q)||l.livreur.toLowerCase().includes(q)).slice(0,4).forEach(l => {
      items.push({ icon:'📋', type:'Tournée', typeColor:'#D1FAE5', typeTextColor:'#065F46', label: l.client+' — '+l.livreur, sub: fdate(l.date)+' · '+fcfa(l.montant), action: () => { setState({ adminTab: 'livraisons', view: 'admin' }); closeGlobalSearch(); } });
    });

    if(!items.length) {
      results.innerHTML = `<div style="padding:28px;text-align:center;color:var(--muted);">Aucun résultat pour "<strong>${escHTML(q)}</strong>"</div>`;
      return;
    }
    results.innerHTML = items.slice(0,10).map((it, idx) => `
      <div class="search-result-item" data-idx="${idx}">
        <span style="font-size:22px;">${it.icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHTML(it.label)}</div>
          <div style="font-size:12px;color:var(--muted);">${escHTML(it.sub)}</div>
        </div>
        <span class="search-result-type" style="background:${it.typeColor};color:${it.typeTextColor};">${it.type}</span>
      </div>
    `).join('');
    results.querySelectorAll('.search-result-item').forEach((el, idx) => {
      el.addEventListener('click', () => items[idx].action());
    });
  });

  wrap.addEventListener('click', e => { if(e.target === wrap) closeGlobalSearch(); });
  document.addEventListener('keydown', searchKeyHandler);
}

function closeGlobalSearch() {
  const el = document.getElementById('global-search-wrap');
  if(el) el.remove();
  document.removeEventListener('keydown', searchKeyHandler);
}

function searchKeyHandler(e) {
  if(e.key === 'Escape') closeGlobalSearch();
}

document.getElementById('fab-search')?.addEventListener('click', openGlobalSearch);
document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openGlobalSearch(); }
});

// 🆕 V14 — PANNEAU DE NOTIFICATIONS INTELLIGENTES
// ════════════════════════════════════════════
function buildNotifications() {
  const notifs = [];
  const now = new Date();

  // Stock farine bas
  const far = db.inventaire?.farine;
  if(far && far.stock <= far.seuil) {
    notifs.push({ icon:'🌾', color:'var(--red)', title:'Stock critique', text:`Il ne reste que ${far.stock.toFixed(1)} sacs de farine (seuil: ${far.seuil}).`, action: () => setState({ adminTab:'inventaire', view:'admin' }) });
  }

  // Créances
  const creancesTotal = Object.values(db.clients||{}).reduce((a,c)=>a+(c.creance||0),0);
  if(creancesTotal > 0) {
    const nbDebiteurs = Object.values(db.clients||{}).filter(c=>c.creance>0).length;
    notifs.push({ icon:'💳', color:'var(--amber)', title:'Créances en attente', text:`${nbDebiteurs} client(s) doivent un total de ${fcfa(creancesTotal)}.`, action: () => setState({ adminTab:'clients', view:'admin' }) });
  }

  // Aucune livraison aujourd'hui
  const livsAuj = (db.livraisons||[]).filter(l => isToday(l.date));
  if(livsAuj.length === 0) {
    notifs.push({ icon:'🚚', color:'var(--muted)', title:'Aucune tournée aujourd\'hui', text:'Aucune tournée enregistrée pour aujourd\'hui.', action: null });
  }

  // Dépenses élevées ce mois
  const startMois = new Date(now.getFullYear(), now.getMonth(), 1);
  const depMois = (db.depenses||[]).filter(d=>new Date(d.date)>=startMois).reduce((a,d)=>a+d.montant, 0);
  const venteMois = (db.livraisons||[]).filter(l=>new Date(l.date)>=startMois&&l.statut==='terminee').reduce((a,l)=>a+l.montant,0);
  if(depMois > venteMois * 0.5 && venteMois > 0) {
    notifs.push({ icon:'⚠️', color:'var(--red)', title:'Dépenses élevées', text:`Les dépenses (${fcfa(depMois)}) représentent plus de 50% du CA ce mois.`, action: () => setState({ adminTab:'depenses', view:'admin' }) });
  }

  // Journées vendeur non clôturées
  const nonCloturees = (db.ventesJournalieresVendeur||[]).filter(v => v.statut === 'en_cours' && isToday(v.date));
  if(nonCloturees.length > 0) {
    notifs.push({ icon:'🛍️', color:'#7C3AED', title:'Journée boutique ouverte', text:`${nonCloturees.length} journée(s) de boutique non clôturée(s) aujourd'hui.`, action: () => setState({ adminTab:'boutiques', view:'admin' }) });
  }

  if(!notifs.length) {
    notifs.push({ icon:'✅', color:'var(--green)', title:'Tout est en ordre !', text:'Aucune alerte active. Excellente gestion !', action: null });
  }

  const list = document.getElementById('notif-list');
  if(!list) return;
  list.innerHTML = notifs.map(n => `
    <div class="notif-item" style="cursor:${n.action?'pointer':'default'};" ${n.action?`onclick="(${n.action.toString()})()"`:''}">
      <div class="notif-dot" style="background:${n.color};"></div>
      <div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px;">${n.icon} ${n.title}</div>
        <div style="font-size:13px;color:var(--muted);">${n.text}</div>
      </div>
    </div>
  `).join('');

  // Update badge
  const badge = document.getElementById('notif-count-badge');
  const alertCount = notifs.filter(n=>n.color==='var(--red)'||n.color==='var(--amber)').length;
  if(badge) badge.textContent = alertCount > 0 ? alertCount : '';
  if(badge) badge.style.display = alertCount > 0 ? 'flex' : 'none';

  return notifs.length;
}

document.getElementById('close-notif-panel')?.addEventListener('click', closeNotifPanel);
document.getElementById('notif-overlay')?.addEventListener('click', closeNotifPanel);

function openNotifPanel() {
  buildNotifications();
  document.getElementById('notif-panel')?.classList.add('open');
  const ov = document.getElementById('notif-overlay');
  if(ov) ov.style.display = 'block';
}
function closeNotifPanel() {
  document.getElementById('notif-panel')?.classList.remove('open');
  const ov = document.getElementById('notif-overlay');
  if(ov) ov.style.display = 'none';
}

function buildCalcModal() {
  return `<div class="modal-backdrop" id="calc-modal-backdrop">
    <div class="modal-box" style="max-width:340px;">
      <button class="modal-close" id="close-calc-modal">✕</button>
      <div class="modal-title">🧮 Calculatrice</div>
      <div id="calc-display">0</div>
      <div class="calc-wrap">
        <button class="calc-btn clr" data-v="C">C</button>
        <button class="calc-btn del" data-v="DEL">⌫</button>
        <button class="calc-btn op" data-v="%">%</button>
        <button class="calc-btn op" data-v="/">÷</button>
        <button class="calc-btn num" data-v="7">7</button>
        <button class="calc-btn num" data-v="8">8</button>
        <button class="calc-btn num" data-v="9">9</button>
        <button class="calc-btn op" data-v="*">×</button>
        <button class="calc-btn num" data-v="4">4</button>
        <button class="calc-btn num" data-v="5">5</button>
        <button class="calc-btn num" data-v="6">6</button>
        <button class="calc-btn op" data-v="-">−</button>
        <button class="calc-btn num" data-v="1">1</button>
        <button class="calc-btn num" data-v="2">2</button>
        <button class="calc-btn num" data-v="3">3</button>
        <button class="calc-btn op" data-v="+">+</button>
        <button class="calc-btn num" data-v="0" style="grid-column:span 2;">0</button>
        <button class="calc-btn num" data-v=".">.</button>
        <button class="calc-btn eq" data-v="=">=</button>
      </div>
      <div style="margin-top:12px;text-align:center;font-size:12px;color:var(--muted);">Appuyez sur = pour calculer</div>
    </div>
  </div>`;
}

function openCalc() {
  const existing = document.getElementById('calc-modal-backdrop');
  if(existing) { existing.remove(); return; }
  const div = document.createElement('div');
  div.innerHTML = buildCalcModal();
  document.body.appendChild(div.firstElementChild);

  let expr = '';
  const display = document.getElementById('calc-display');

  document.querySelectorAll('.calc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.v;
      if(v === 'C') { expr = ''; display.textContent = '0'; }
      else if(v === 'DEL') { expr = expr.slice(0,-1)||''; display.textContent = expr||'0'; }
      else if(v === '=') {
        try {
          const res = Function('"use strict"; return ('+expr+')')();
          display.textContent = Number.isFinite(res) ? res : 'Erreur';
          expr = String(res);
        } catch { display.textContent = 'Erreur'; expr = ''; }
      } else {
        expr += v;
        display.textContent = expr;
      }
    });
  });

  document.getElementById('close-calc-modal')?.addEventListener('click', () => {
    document.getElementById('calc-modal-backdrop')?.remove();
  });
  document.getElementById('calc-modal-backdrop')?.addEventListener('click', e => {
    if(e.target.id === 'calc-modal-backdrop') e.target.remove();
  });
}

// 🆕 V14 — STATISTIQUES COMPARATIVES
// ════════════════════════════════════════════
function calcComparatif() {
  const now = new Date();
  const startMoisActuel = new Date(now.getFullYear(), now.getMonth(), 1);
  const startMoisPrec = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const endMoisPrec = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);

  const livsActuel = (db.livraisons||[]).filter(l => new Date(l.date)>=startMoisActuel && l.statut==='terminee');
  const livsPrec   = (db.livraisons||[]).filter(l => new Date(l.date)>=startMoisPrec && new Date(l.date)<=endMoisPrec && l.statut==='terminee');

  const caActuel  = livsActuel.reduce((a,l)=>a+l.montant,0);
  const caPrec    = livsPrec.reduce((a,l)=>a+l.montant,0);
  const diffCA    = caPrec > 0 ? ((caActuel-caPrec)/caPrec*100).toFixed(1) : null;

  const venduActuel = livsActuel.reduce((a,l)=>a+l.vendu,0);
  const venduPrec   = livsPrec.reduce((a,l)=>a+l.vendu,0);
  const diffVendu   = venduPrec > 0 ? ((venduActuel-venduPrec)/venduPrec*100).toFixed(1) : null;

  return { caActuel, caPrec, diffCA, venduActuel, venduPrec, diffVendu };
}

function compareBadge(diff) {
  if(diff === null) return '';
  const val = parseFloat(diff);
  if(val > 0) return `<span class="compare-badge up">↑ +${diff}%</span>`;
  if(val < 0) return `<span class="compare-badge down">↓ ${diff}%</span>`;
  return `<span class="compare-badge flat">→ stable</span>`;
}

// 📦  SERVICE WORKER — Cache du logiciel
// ════════════════════════════════════════════
if('serviceWorker' in navigator) {
  // Créer le SW inline via blob
  const swCode = `
const CACHE = 'bamba-v13';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([location.href]))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if(e.request.mode === 'navigate') {
    e.respondWith(
      fetch(e.request).then(r => {
        const clone = r.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return r;
      }).catch(() => caches.match(e.request))
    );
  }
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(() => {
    console.log('✅ Service Worker enregistré — Logiciel disponible hors ligne');
  }).catch(e => console.log('SW non supporté:', e));
}
